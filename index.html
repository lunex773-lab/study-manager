<!DOCTYPE html>
<html lang="ja" data-theme="midnight"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="受験トラッカー">
<meta name="theme-color" content="#000000">
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;rect width='100' height='100' rx='22' fill='%230D1220'/&gt;&lt;circle cx='50' cy='50' r='30' fill='none' stroke='%238AA2FF' stroke-width='9' stroke-linecap='round' stroke-dasharray='150 200' transform='rotate(-90 50 50)'/&gt;&lt;/svg&gt;">
<title>受験進捗トラッカー</title>

<style>
  :root{
    --radius:20px; --tap:44px;
    --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }
  [data-theme="midnight"]{
    --bg:#000000; --card:#1C1C1E; --cardAlt:#2C2C2E; --text:#FFFFFF; --subtext:#98989F;
    --faint:#38383A; --accent:#0A84FF; --flame:#FF9F0A; --danger:#FF453A;
    --s0:#48484A; --s1:#0A84FF; --s2:#FF9F0A; --s3:#30D158; --heat:#30D158; --shadow:rgba(0,0,0,.5);
  }
  [data-theme="daybreak"]{
    --bg:#F2F2F7; --card:#FFFFFF; --cardAlt:#E9E9EF; --text:#1C1C1E; --subtext:#8E8E93;
    --faint:#D1D1D6; --accent:#007AFF; --flame:#FF9500; --danger:#FF3B30;
    --s0:#C7C7CC; --s1:#007AFF; --s2:#FF9500; --s3:#34C759; --heat:#34C759; --shadow:rgba(60,60,67,.12);
  }
  [data-theme="sakura"]{
    --bg:#1F1627; --card:#2C2035; --cardAlt:#382943; --text:#F7EEF5; --subtext:#BDA2BA;
    --faint:#443351; --accent:#F17FA5; --flame:#FFB454; --danger:#FF6B6B;
    --s0:#54445C; --s1:#8E7CF2; --s2:#F2A83B; --s3:#3FCF8E; --heat:#F17FA5; --shadow:rgba(0,0,0,.4);
  }
  [data-theme="carbon"]{
    --bg:#16191F; --card:#23262E; --cardAlt:#2E333D; --text:#F0F2F5; --subtext:#A0A6B1;
    --faint:#3A4049; --accent:#6E9BFF; --flame:#FFB454; --danger:#F87171;
    --s0:#535963; --s1:#5D8BF4; --s2:#F2A83B; --s3:#3FCF8E; --heat:#3FCF8E; --shadow:rgba(0,0,0,.45);
  }
  [data-theme="ocean"]{
    --bg:#0F1E27; --card:#182B37; --cardAlt:#233A47; --text:#E8F3F8; --subtext:#93A9B4;
    --faint:#2C4855; --accent:#38BDF8; --flame:#FFB454; --danger:#F87171;
    --s0:#44585F; --s1:#38A8D8; --s2:#F2A83B; --s3:#3FCF8E; --heat:#38BDF8; --shadow:rgba(0,0,0,.45);
  }
  [data-theme="forest"]{
    --bg:#111F1A; --card:#1B2D26; --cardAlt:#253B32; --text:#EAF3EE; --subtext:#99AEA3;
    --faint:#2F4A3F; --accent:#4FBE8B; --flame:#FFB454; --danger:#F0776B;
    --s0:#45584F; --s1:#4A9E8E; --s2:#E2A13C; --s3:#5FD39A; --heat:#4FBE8B; --shadow:rgba(0,0,0,.45);
  }
  [data-theme="grape"]{
    --bg:#191325; --card:#271C34; --cardAlt:#332745; --text:#F1ECF7; --subtext:#AF9CBB;
    --faint:#3E3155; --accent:#A78BFA; --flame:#FFB454; --danger:#F87171;
    --s0:#4F4360; --s1:#8E7CF2; --s2:#F2A83B; --s3:#3FCF8E; --heat:#A78BFA; --shadow:rgba(0,0,0,.45);
  }
  [data-theme="custom"]{
    --bg:#0D1220; --card:#161D31; --cardAlt:#1E2740; --text:#EEF1FA; --subtext:#97A0BE;
    --faint:#242E4E; --accent:#8AA2FF; --flame:#FFB454; --danger:#F87171;
    --s0:#454F70; --s1:#5D8BF4; --s2:#F2A83B; --s3:#3FCF8E; --heat:#2EC77E; --shadow:rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--font); background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
  input,textarea{font-family:inherit}
  .ic{display:block;flex:none}
  #app{max-width:520px;margin:0 auto;min-height:100%}

  /* ---- layout ---- */
  .screen{padding:0 16px 96px;min-height:100%}
  .safe-top{padding-top:calc(env(safe-area-inset-top) + 14px)}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
  .hd h1{font-size:28px;font-weight:700;margin:0}
  .backhd{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 10px) 0 6px}
  .backhd .title{font-size:17px;font-weight:800}
  .iconbtn{width:38px;height:38px;border-radius:19px;display:flex;align-items:center;justify-content:center;background:var(--cardAlt);color:var(--text)}
  .iconbtn.accent{background:var(--accent);color:#fff}

  /* ---- card ---- */
  .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 1px 3px var(--shadow)}
  .card+.card{margin-top:12px}
  .press{transition:transform .08s}
  .press:active{transform:scale(.98)}
  .sect{font-size:12px;font-weight:800;color:var(--subtext);margin:20px 2px 8px;letter-spacing:.02em}
  .muted{color:var(--subtext)}
  .center{text-align:center}

  /* ---- ring ---- */
  .ring{position:relative;display:inline-flex}
  .ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* ---- chips ---- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .chip{padding:9px 14px;border-radius:999px;font-size:13px;font-weight:700;background:var(--cardAlt);color:var(--subtext);border:1.5px solid transparent}
  .chip.on{color:#fff}

  /* ---- buttons ---- */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;background:var(--accent);color:#fff;font-weight:600;font-size:16px;transition:transform .08s,opacity .15s}
  .btn:active{transform:scale(.98)}
  .btn[disabled]{opacity:.4}
  .btn.ghost{background:transparent;border:1.5px solid var(--faint);color:var(--subtext);font-size:14px}

  /* ---- tabbar ---- */
  .tabbar{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;display:flex;
    background:color-mix(in srgb,var(--card) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--faint);padding-bottom:env(safe-area-inset-bottom);z-index:20}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;color:var(--subtext);font-size:10px;font-weight:700}
  .tab.on{color:var(--accent)}

  /* ---- grid ---- */
  .grid{display:flex;flex-wrap:wrap;justify-content:space-between;row-gap:10px}
  .cell{width:48.4%;background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px var(--shadow)}
  .bubble{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:19px}

  /* ---- topic rows ---- */
  .trow{display:flex;align-items:center;background:var(--card);border-radius:16px;padding:12px}
  .sbar{width:4px;height:34px;border-radius:2px;flex:none}
  .pill{border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}
  .distpill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 9px}
  .dot{width:8px;height:8px;border-radius:4px}

  /* ---- heatmap ---- */
  .heatmap{display:flex;gap:3px;justify-content:center}
  .heatcol{display:flex;flex-direction:column;gap:3px}
  .heatcell{width:13px;height:13px;border-radius:3px;background:var(--faint)}
  .heatcell[data-l="-1"]{background:transparent}
  .heatcell[data-l="1"]{background:color-mix(in srgb,var(--heat) 30%,var(--faint))}
  .heatcell[data-l="2"]{background:color-mix(in srgb,var(--heat) 55%,var(--faint))}
  .heatcell[data-l="3"]{background:color-mix(in srgb,var(--heat) 78%,transparent)}
  .heatcell[data-l="4"]{background:var(--heat)}
  .heatcell[data-today="1"]{box-shadow:0 0 0 1.5px var(--accent)}

  /* ---- weekly bars ---- */
  .wbars{display:flex;justify-content:space-between;align-items:flex-end;gap:6px}
  .wbcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .wbtrack{width:100%;max-width:26px;height:110px;display:flex;align-items:flex-end;justify-content:center}
  .wbstack{width:100%;border-radius:6px;overflow:hidden;display:flex;flex-direction:column-reverse}
  .wblabel{font-size:11px;font-weight:700;color:var(--subtext)}
  .wblabel[data-today="1"]{color:var(--accent)}
  .wbmin{font-size:10px;color:var(--subtext);height:12px}

  /* ---- balance bars ---- */
  .baltrack{height:10px;border-radius:5px;background:var(--cardAlt);overflow:hidden}
  .balfill{height:100%;border-radius:5px}

  /* ---- modal ---- */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:22px;z-index:40}
  .dialog{width:100%;max-width:460px;background:var(--card);border-radius:var(--radius);padding:20px;max-height:88vh;overflow-y:auto}
  .dialog h3{margin:0 0 12px;font-size:17px;font-weight:800}
  .field{width:100%;background:var(--cardAlt);color:var(--text);border:none;border-radius:12px;padding:12px 14px;font-size:16px;outline:none}
  textarea.field{min-height:110px;resize:vertical;line-height:1.5}
  .colorrow{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0}
  .cdot{width:30px;height:30px;border-radius:15px;border:3px solid transparent}
  .iconrow{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0}
  .ichoice{width:44px;height:44px;border-radius:14px;border:1.5px solid transparent;background:var(--cardAlt);display:flex;align-items:center;justify-content:center;font-size:22px}

  /* ---- sheet (stage) ---- */
  .sheetwrap{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;justify-content:flex-end}
  .sheetbg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
  .sheet{position:relative;background:var(--card);border-radius:22px 22px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom) + 18px);max-width:520px;margin:0 auto;width:100%}
  .sheetrow{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:14px}

  /* ---- timer ---- */
  .runwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:82vh;padding:24px;text-align:center}
  .tnum{font-size:46px;font-weight:900;font-variant-numeric:tabular-nums}

  /* ---- banner ---- */
  .banner{display:flex;align-items:center;gap:8px;border-radius:14px;padding:10px 14px;margin-bottom:12px;font-weight:800;font-size:13px}

  /* ---- onboarding ---- */
  .obhd{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 20px 4px}
  .obdots{display:flex;gap:6px}
  .obdot{width:7px;height:7px;border-radius:4px;background:var(--faint);transition:width .2s}
  .obdot.on{width:20px;background:var(--accent)}
  .obbody{padding:20px}
  .obh1{font-size:30px;font-weight:700;line-height:1.28;margin:0 0 10px;white-space:pre-line}
  .oblead{font-size:14px;line-height:1.5;color:var(--subtext);margin:0 0 22px}
  .oblabel{font-size:12px;font-weight:800;color:var(--subtext);margin:6px 0 8px}
  .pcell{width:48.4%;border-radius:16px;border:1.5px solid transparent;padding:12px;display:flex;align-items:center;background:var(--card)}
  .picon{width:32px;height:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .obfooter{display:flex;align-items:center;gap:12px;padding:8px 20px calc(env(safe-area-inset-bottom) + 12px)}

  /* ---- confetti ---- */
  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:80}
  .confetti i{position:absolute;top:-18px;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(115vh) rotate(720deg);opacity:.85}}

  .empty{border-radius:var(--radius);padding:24px;background:var(--card);text-align:center}
  .row{display:flex;align-items:center}
  .grow{flex:1;min-width:0}
  .clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  input[type="date"].field{min-height:24px}

  /* ---- 融合追加分 ---- */
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 82px);transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:13px;font-weight:800;padding:11px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;max-width:86%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .tabicwrap{position:relative;display:inline-flex}
  .badge{position:absolute;top:-5px;right:-9px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1}
  .link{color:var(--accent);font-weight:800;font-size:13px;padding:4px;flex:none}
  .donebtn{flex:none;align-self:center;padding:9px 15px;border-radius:12px;background:var(--s3);color:#fff;font-weight:800;font-size:13px;transition:transform .08s}
  .donebtn:active{transform:scale(.94)}
  .undobtn{flex:none;align-self:center;padding:9px 14px;border-radius:12px;background:var(--cardAlt);color:var(--subtext);font-weight:800;font-size:13px;transition:transform .08s}
  .undobtn:active{transform:scale(.94)}
  .revtoggle{display:flex;align-items:center;gap:12px;width:100%;padding:12px;border-radius:14px;background:var(--cardAlt);margin-top:12px;border:1.5px solid transparent;transition:border-color .15s,background .15s}
  .revtoggle.on{border-color:var(--s3);background:color-mix(in srgb,var(--s3) 12%,var(--cardAlt))}
  .revcheck{width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:var(--s3);flex:none}
  .revempty{width:19px;height:19px;border-radius:10px;border:2px solid var(--subtext);display:block}
  .donut{width:168px;height:168px;display:block;margin:0 auto}
  .donutwrap{display:flex;justify-content:center;padding:4px 0 12px}
  .donutTot{font-size:22px;font-weight:900;fill:var(--text)}
  .donutLbl{font-size:11px;font-weight:700;fill:var(--subtext)}
  .legend{display:flex;flex-direction:column;gap:9px}
  .leg{display:flex;align-items:center;gap:8px}
  .leg .dot{flex:none}
  .lname{font-size:13px;font-weight:700;flex:none;max-width:78px}
  .lbar{flex:1;height:8px;border-radius:4px;background:var(--cardAlt);overflow:hidden}
  .lfill{display:block;height:100%;border-radius:4px}
  .lpct{font-size:11px;font-weight:700;width:34px;text-align:right}
  input[type="color"]{-webkit-appearance:none;appearance:none;width:44px;height:44px;border:none;border-radius:12px;background:none;padding:0;cursor:pointer;flex:none}
  input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
  input[type="color"]::-webkit-color-swatch{border:1.5px solid var(--faint);border-radius:12px}
  input[type="color"]::-moz-color-swatch{border:1.5px solid var(--faint);border-radius:12px}
  .accentrow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:2px}
  .aswatch{width:30px;height:30px;border-radius:15px;border:3px solid transparent;flex:none}
  input[type="range"]{ -webkit-appearance:none; appearance:none; height:26px; background:transparent; accent-color:var(--accent); cursor:pointer; }
  input[type="range"]::-webkit-slider-runnable-track{ height:6px; border-radius:3px; background:var(--faint); }
  input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:24px; height:24px; margin-top:-9px; border-radius:12px; background:#fff; box-shadow:0 1px 5px rgba(0,0,0,.35); }
  input[type="range"]::-moz-range-track{ height:6px; border-radius:3px; background:var(--faint); }
  input[type="range"]::-moz-range-thumb{ width:24px; height:24px; border:none; border-radius:12px; background:#fff; box-shadow:0 1px 5px rgba(0,0,0,.35); }
  .themegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .themecard{border:2px solid var(--faint);border-radius:14px;padding:7px;background:var(--card);text-align:center;transition:transform .08s}
  .themecard:active{transform:scale(.96)}
  .themecard.on{border-color:var(--accent)}
  .themeprev{height:44px;border-radius:9px;background:var(--bg);padding:7px;display:flex;align-items:flex-end;overflow:hidden}
  .themebar{height:20px;width:100%;border-radius:6px;background:var(--card);display:flex;align-items:center;gap:5px;padding:0 6px}
  .themedot{width:9px;height:9px;border-radius:5px;background:var(--accent);flex:none}
  .themedot2{height:6px;flex:1;border-radius:3px;background:var(--cardAlt)}
  .themename{font-size:10px;font-weight:800;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ================= iOS級のモーション & 質感 ================= */
  :root{ --spring:cubic-bezier(.32,.72,0,1); --smooth:cubic-bezier(.4,0,.2,1); }
  html{ -webkit-text-size-adjust:100%; }
  body{ text-rendering:optimizeLegibility; }
  #app{ overflow-x:hidden; }
  .view-wrap{ min-height:100%; }

  /* --- 画面遷移(push / pop / フェード+スタッガー) --- */
  @keyframes pushIn{ from{opacity:.35; transform:translateX(24px);} to{opacity:1; transform:none;} }
  @keyframes popIn{ from{opacity:.35; transform:translateX(-24px);} to{opacity:1; transform:none;} }
  @keyframes itemRise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;} }
  .view-enter-push{ animation:pushIn .38s var(--spring) both; }
  .view-enter-pop{ animation:popIn .38s var(--spring) both; }
  .view-enter-fade .screen>*, .view-enter-fade .backhd{ animation:itemRise .46s var(--spring) both; }
  .view-enter-fade .screen>*:nth-child(1){animation-delay:.00s}
  .view-enter-fade .screen>*:nth-child(2){animation-delay:.035s}
  .view-enter-fade .screen>*:nth-child(3){animation-delay:.07s}
  .view-enter-fade .screen>*:nth-child(4){animation-delay:.10s}
  .view-enter-fade .screen>*:nth-child(5){animation-delay:.13s}
  .view-enter-fade .screen>*:nth-child(6){animation-delay:.16s}
  .view-enter-fade .screen>*:nth-child(7){animation-delay:.185s}
  .view-enter-fade .screen>*:nth-child(8){animation-delay:.21s}
  .view-enter-fade .screen>*:nth-child(n+9){animation-delay:.23s}

  /* --- シート/ダイアログのスプリング登場 --- */
  @keyframes sheetIn{ from{transform:translateY(100%);} to{transform:none;} }
  @keyframes dialogIn{ from{opacity:0; transform:translateY(10px) scale(.955);} to{opacity:1; transform:none;} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .sheet-enter{ animation:sheetIn .4s var(--spring) both; }
  .dialog-enter{ animation:dialogIn .28s var(--spring) both; }
  .fade-enter{ animation:fadeIn .32s ease both; }

  /* --- 押下マイクロインタラクション(全インタラクティブ要素) --- */
  .press,.btn,.chip,.cell,.trow,.sheetrow,.cdot,.ichoice,.themecard,.donebtn,.undobtn,.iconbtn,.aswatch,.tab,.link,.revtoggle,.pcell,.obdot{
    transition:transform .2s var(--spring), background-color .22s var(--smooth), color .22s var(--smooth), border-color .22s var(--smooth), box-shadow .24s var(--smooth), opacity .2s var(--smooth);
  }
  .press:active,.cell:active,.trow:active,.sheetrow:active,.pcell:active{ transform:scale(.972); }
  .btn:active{ transform:scale(.965); }
  .chip:active,.cdot:active,.ichoice:active,.themecard:active,.aswatch:active{ transform:scale(.93); }
  .donebtn:active,.undobtn:active,.iconbtn:active,.link:active{ transform:scale(.9); }
  .revtoggle:active{ transform:scale(.985); }

  /* --- タブバー(iOSのすりガラス & アクティブ表現) --- */
  .tabbar{ backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%); }
  .tab .ic{ transition:transform .28s var(--spring); }
  .tab span:last-child{ transition:color .22s var(--smooth); }
  .tab.on .tabicwrap{ transform:translateY(-1px); }
  .tab.on .ic{ transform:scale(1.08); }
  .badge{ animation:none; }

  /* --- リングの充填はスプリングで --- */
  .ringfg{ transition:stroke-dashoffset .85s var(--spring) !important; }

  /* --- タイポグラフィ(SFのタイトなトラッキング) --- */
  .hd h1,.backhd .title,.tnum,.donutTot,.obh1{ letter-spacing:-.022em; }
  .sect{ letter-spacing:.01em; }

function getVarHex(v){ if(!v) return "#8AA2FF"; if(v[0]==="#") return v; const m=String(v).match(/--[a-z0-9\-]+/i); const name=m?m[0]:v; const val=getComputedStyle(document.documentElement).getPropertyValue(name).trim(); return val||"#8AA2FF"; }

/* ---------- ユーティリティ ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function uid(){ db.seq=(db.seq||0)+1; return db.seq; }
function alpha(hex,a){
  if(!hex||hex[0]!=="#") return hex;
  const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function clamp01(x){return Math.max(0,Math.min(1,x));}

/* ---------- 日付 ---------- */
function pad(n){return String(n).padStart(2,"0");}
function toDateStr(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function todayStr(){return toDateStr(new Date());}
function parseDate(s){const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function daysUntil(s){return Math.round((parseDate(s)-parseDate(todayStr()))/86400000);}
function shiftDate(s,days){const d=parseDate(s);d.setDate(d.getDate()+days);return toDateStr(d);}
function lastNDateStrs(n){const a=[],t=parseDate(todayStr());for(let i=n-1;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);a.push(toDateStr(d));}return a;}
const WEEKDAY_JP=["日","月","火","水","木","金","土"];
function weekdayOf(s){return parseDate(s).getDay();}
function formatDateJP(s){const d=parseDate(s);return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${WEEKDAY_JP[d.getDay()]})`;}
function formatMinutes(m){if(m<60)return `${m}分`;const h=Math.floor(m/60),mm=m%60;return mm===0?`${h}時間`:`${h}時間${mm}分`;}
function fmtIso(iso){if(!iso)return "—";const d=new Date(iso);return isNaN(d)?"—":formatDateJP(toDateStr(d));}
function fmtClock(sec){sec=Math.max(0,sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h>0?`${h}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;}
function nextCommonTestDate(){
  const now=new Date();
  for(let yr=now.getFullYear();yr<=now.getFullYear()+1;yr++){

    const ds=toDateStr(new Date(yr,0,1+firstSat+14)); // 1月第3土曜

}

/* ---------- データ層(localStorage) ---------- */
function defaultDB(){return {schemaVersion:2, seq:0, settings:{theme:"midnight",onboarded:false,school:null,customAccent:null,customTheme:"#4F86F7",goal:null,soundOn:true,soundVol:0.5}, subjects:[], topics:[], sessions:[], exams:[]};}
function normalizeV2(p){
  const d=Object.assign(defaultDB(), p);
  d.settings=Object.assign(defaultDB().settings, p.settings||{});
  d.schemaVersion=2;
  d.sessions=(p.sessions||[]).map(s=>Object.assign({topicId:null,content:null,reviews:null}, s));
  return d;
}
function migrateFromKobe(old){
  const d=defaultDB();
  let seq=0; const nid=()=>(++seq);
  d.settings.onboarded=true;
  d.settings.school=(typeof old.school==="string"&&old.school.trim())?old.school.trim():null;
  d.settings.customAccent=(typeof old.themeColor==="string"&&/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(old.themeColor))?old.themeColor:null;
  if(typeof old.summerGoalHours==="number"&&old.summerGoalHours>0){ d.settings.goal={label:"夏期",start:"2026-07-01",end:"2026-08-31",hours:old.summerGoalHours}; }
  const examDate=old.examDate||"2027-01-17";
  d.exams=[{id:nid(),name:(d.settings.school?d.settings.school+" 本番":"入試 本番"),date:examDate,isPrimary:true}];
  const nameToId={};
  (old.subjects||[]).forEach((s,i)=>{ const id=nid(); d.subjects.push({id,name:s.name,color:(s.color||"#4F86F7"),icon:"📘",order:i,archived:false,createdAt:new Date().toISOString()}); nameToId[s.name]=id; });
  (old.entries||[]).forEach(e=>{
    let sid=nameToId[e.subject];
    if(sid==null){ const id=nid(); d.subjects.push({id,name:e.subject||"その他",color:(e.color||"#94A3B8"),icon:"📘",order:d.subjects.length,archived:false,createdAt:new Date().toISOString()}); nameToId[e.subject]=id; sid=id; }
    const ds=e.date||todayStr();
    d.sessions.push({ id:nid(), subjectId:sid, topicId:null, date:ds, startedAt:ds+"T12:00:00.000Z", durationMin:(e.minutes||0),

      reviews:(e.reviews&&typeof e.reviews==="object")?{day1:!!e.reviews.day1,week1:!!e.reviews.week1,month1:!!e.reviews.month1}:{day1:false,week1:false,month1:false} });

function loadDB(){
  try{

}

/* ---------- 派生値 ---------- */
function activeSubjects(){ return db.subjects.filter(s=>!s.archived).sort((a,b)=>a.order-b.order); }
function subjectStats(sub){
  const ts=db.topics.filter(t=>t.subjectId===sub.id);
  const stageSum=ts.reduce((a,t)=>a+t.stage,0);
  const perfect=ts.filter(t=>t.stage===3).length;
  return {topicCount:ts.length, stageSum, perfectCount:perfect, progress:ts.length?stageSum/(3*ts.length):0};
}
function topicsOf(sid){ return db.topics.filter(t=>t.subjectId===sid).sort((a,b)=>a.order-b.order); }
function topicMinutes(tid){ return db.sessions.filter(s=>s.topicId===tid).reduce((a,s)=>a+s.durationMin,0); }
function minutesByDate(){ const m={}; db.sessions.forEach(s=>{m[s.date]=(m[s.date]||0)+s.durationMin;}); return m; }
function totals(){ return {totalMinutes:db.sessions.reduce((a,s)=>a+s.durationMin,0), perfectTopics:db.topics.filter(t=>t.stage===3).length, sessionCount:db.sessions.length}; }
function computeStreak(){
  const dates=new Set(db.sessions.map(s=>s.date));
  const today=todayStr();
  let cur=0, cursor = dates.has(today)?today : (dates.has(shiftDate(today,-1))?shiftDate(today,-1):null);
  while(cursor && dates.has(cursor)){ cur++; cursor=shiftDate(cursor,-1); }
  let longest=0, run=0, prev=null;
  [...dates].sort().forEach(d=>{ run = (prev && shiftDate(prev,1)===d)?run+1:1; longest=Math.max(longest,run); prev=d; });
  return {current:cur, longest, studiedToday:dates.has(today)};
}
function primaryExam(){
  if(!db.exams.length) return null;
  const p=db.exams.find(e=>e.isPrimary); if(p) return p;
  const fut=db.exams.filter(e=>daysUntil(e.date)>=0).sort((a,b)=>daysUntil(a.date)-daysUntil(b.date));
  return fut[0]||db.exams.slice().sort((a,b)=>a.date<b.date?1:-1)[0];
}
function otherExams(primaryId){ return db.exams.filter(e=>e.id!==primaryId).sort((a,b)=>a.date<b.date?-1:1); }

/* ---------- ミューテーション ---------- */
function createSubject(name,color,icon){ const id=uid(); db.subjects.push({id,name,color,icon,order:db.subjects.length,archived:false,createdAt:new Date().toISOString()}); saveDB(); return id; }

function deleteSubject(id){ db.subjects=db.subjects.filter(s=>s.id!==id); const tids=db.topics.filter(t=>t.subjectId===id).map(t=>t.id); db.topics=db.topics.filter(t=>t.subjectId!==id); db.sessions=db.sessions.filter(se=>se.subjectId!==id); saveDB(); }

function addSession(sub,top,startedAt,min,content,reviewOn){ db.sessions.push({id:uid(),subjectId:sub,topicId:top,date:toDateStr(startedAt),startedAt:startedAt.toISOString(),durationMin:min,content:(content&&content.trim())?content.trim():null,reviews:reviewOn?{day1:false,week1:false,month1:false}:null}); if(top!=null){const t=db.topics.find(x=>x.id===top); if(t)t.lastStudiedAt=startedAt.toISOString();} saveDB(); }
function markReviewDone(sid,key){ const s=db.sessions.find(x=>x.id===sid); if(s&&s.reviews){ s.reviews[key]=true; saveDB(); } }

function deleteSession(id){ db.sessions=db.sessions.filter(s=>s.id!==id); saveDB(); }
function addExam(name,date,primary){ if(primary)db.exams.forEach(e=>e.isPrimary=false); db.exams.push({id:uid(),name,date,isPrimary:!!primary}); saveDB(); }
function updateExam(id,name,date){ const e=db.exams.find(x=>x.id===id); if(e){e.name=name;e.date=date;} saveDB(); }
function setPrimaryExam(id){ db.exams.forEach(e=>e.isPrimary=(e.id===id)); saveDB(); }

function setTheme(key){ db.settings.theme=key; saveDB(); document.documentElement.setAttribute("data-theme",key); applyAccent(); }

/* ---------- アクセント色 / カスタムテーマ ---------- */
function hexToHsl(hex){
  let c=String(hex||"").replace("#",""); if(c.length===3)c=c.split("").map(x=>x+x).join("");
  const r=parseInt(c.substr(0,2),16)/255,g=parseInt(c.substr(2,2),16)/255,b=parseInt(c.substr(4,2),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h=0,s=0,l=(mx+mn)/2;
  if(mx!==mn){ const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn); if(mx===r)h=(g-b)/d+(g<b?6:0); else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; }
  return {h:h||0, s:s*100, l:l*100};
}
function hslToHex(h,s,l){
  s/=100; l/=100; const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const to=x=>{const v=Math.round(x*255); return v.toString(16).padStart(2,"0");};
  return "#"+to(f(0))+to(f(8))+to(f(4));
}
const CUSTOM_VARS=["--bg","--card","--cardAlt","--faint","--text","--subtext","--heat","--s1"];
function applyThemeVars(){
  const root=document.documentElement;
  CUSTOM_VARS.forEach(p=>root.style.removeProperty(p));
  if(db.settings.theme==="custom"){
    const base=db.settings.customTheme||"#4F86F7", c=hexToHsl(base), sat=Math.max(16,Math.min(52,c.s));
    root.style.setProperty("--bg",      hslToHex(c.h,Math.min(sat,42),11));
    root.style.setProperty("--card",    hslToHex(c.h,Math.min(sat,40),16));
    root.style.setProperty("--cardAlt", hslToHex(c.h,Math.min(sat,38),22));
    root.style.setProperty("--faint",   hslToHex(c.h,Math.min(sat,36),29));
    root.style.setProperty("--text",    hslToHex(c.h,18,96));
    root.style.setProperty("--subtext", hslToHex(c.h,14,70));
    root.style.setProperty("--heat",    base);
    root.style.setProperty("--s1",      base);
  }
}
function applyAccent(){
  applyThemeVars();
  const a=db.settings.customAccent, root=document.documentElement;
  if(a && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(a)) root.style.setProperty("--accent", a);
  else if(db.settings.theme==="custom") root.style.setProperty("--accent", db.settings.customTheme||"#4F86F7");
  else root.style.removeProperty("--accent");
}
function setAccentColor(hex){ db.settings.customAccent=hex; saveDB(); applyAccent(); render(); }
function resetAccentColor(){ db.settings.customAccent=null; saveDB(); applyAccent(); render(); }
function setThemeBase(hex){ db.settings.customTheme=hex; db.settings.theme="custom"; saveDB(); applyAccent(); render(); }

/* ---------- 効果音(Web Audioで合成・外部ファイル不要) ---------- */
let _audioCtx=null;
function audioCtx(){
  if(_audioCtx) return _audioCtx;
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return null;
  try{ _audioCtx=new AC(); }catch(e){ return null; }
  return _audioCtx;
}
// type: tap(軽いクリック) / select(選択) / success(完了・記録) / back / toggle / error
function playSound(type){
  if(!db.settings.soundOn) return;
  const vol=(typeof db.settings.soundVol==="number"?db.settings.soundVol:0.5);
  if(vol<=0) return;
  const ctx=audioCtx(); if(!ctx) return;
  if(ctx.state==="suspended"){ try{ctx.resume();}catch(e){} }
  const now=ctx.currentTime;
  const notes={
    tap:[[880,0.05]],
    select:[[660,0.06]],
    toggle:[[740,0.05]],
    back:[[520,0.07]],
    success:[[784,0.09],[1175,0.14]],   // G5 → D6 の上行
    error:[[300,0.12],[220,0.16]],       // 下行
  }[type]||[[880,0.05]];
  const master=ctx.createGain();
  master.gain.value=Math.max(0,Math.min(1,vol))*0.32; // 全体の上限を抑える
  master.connect(ctx.destination);
  notes.forEach((n,i)=>{
    const [freq,dur]=n, t0=now+i*0.06;
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type="sine"; osc.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(1,t0+0.008);   // 速いアタック
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); // なめらかな減衰
    osc.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0+dur+0.02);
  });
}
function setSoundOn(on){ db.settings.soundOn=on; saveDB(); if(on)playSound("select"); render(); }
function setSoundVol(v){ db.settings.soundVol=Math.max(0,Math.min(1,v)); saveDB(); }

/* ---------- トースト ---------- */
let toastTimer=null;
function toast(msg){
  let el=document.getElementById("toastBar");
  if(!el){ el=document.createElement("div"); el.id="toastBar"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("show");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

/* ---------- 復習(エビングハウス) ---------- */
function dueItems(){
  const t=parseDate(todayStr()).getTime(), DAY=86400000;
  const due=[], up=[];
  db.sessions.forEach(s=>{
    if(!s.reviews) return;
    STAGES.forEach(st=>{
      if(s.reviews[st.key]) return;
      const dd=parseDate(shiftDate(s.date,st.days)).getTime();
      const item={s,st,dd,over:dd<t};
      if(dd<=t) due.push(item);
      else if(dd<=t+7*DAY) up.push(item);
    });
  });
  due.sort((a,b)=>a.dd-b.dd||a.st.days-b.st.days);
  up.sort((a,b)=>a.dd-b.dd);
  return {due,up};
}
function dueCount(){ return dueItems().due.length; }
function completedReviews(){
  const list=[];
  db.sessions.forEach(s=>{ if(!s.reviews) return; STAGES.forEach(st=>{ if(s.reviews[st.key]) list.push({s,st,dd:parseDate(shiftDate(s.date,st.days)).getTime()}); }); });
  list.sort((a,b)=>b.dd-a.dd);
  return list;
}
function recentSessions(n){ return db.sessions.slice().sort((a,b)=>String(b.startedAt||"").localeCompare(String(a.startedAt||""))).slice(0,n); }
function sessionLabel(s){

/* ---------- ドーナツ(手描きSVG) ---------- */
function polar(cx,cy,r,deg){ const rad=deg*Math.PI/180; return [cx+r*Math.sin(rad), cy-r*Math.cos(rad)]; }
function arc(cx,cy,rO,rI,a0,a1){
  const large=(a1-a0)>180?1:0;
  const o0=polar(cx,cy,rO,a0),o1=polar(cx,cy,rO,a1),i1=polar(cx,cy,rI,a1),i0=polar(cx,cy,rI,a0);
  return "M "+o0[0].toFixed(2)+" "+o0[1].toFixed(2)+" A "+rO+" "+rO+" 0 "+large+" 1 "+o1[0].toFixed(2)+" "+o1[1].toFixed(2)+
         " L "+i1[0].toFixed(2)+" "+i1[1].toFixed(2)+" A "+rI+" "+rI+" 0 "+large+" 0 "+i0[0].toFixed(2)+" "+i0[1].toFixed(2)+" Z";
}
function donut(slices,total){
  const cx=100,cy=100,rO=84,rI=52;
  const center='<text x="100" y="96" text-anchor="middle" class="donutTot">'+esc(fmtHM(total))+'</text><text x="100" y="115" text-anchor="middle" class="donutLbl">合計</text>';
  if(!slices.length) return "";
  if(slices.length===1) return '<svg viewBox="0 0 200 200" class="donut"><circle cx="100" cy="100" r="'+rO+'" fill="'+slices[0].color+'"/><circle cx="100" cy="100" r="'+rI+'" fill="var(--card)"/>'+center+'</svg>';
  let a=0,paths="";
  slices.forEach(s=>{ const sweep=s.minutes/total*360; paths+='<path d="'+arc(cx,cy,rO,rI,a,a+sweep)+'" fill="'+s.color+'" stroke="var(--card)" stroke-width="2"/>'; a+=sweep; });
  return '<svg viewBox="0 0 200 200" class="donut">'+paths+center+'</svg>';
}

/* ---------- 統計データ(期間フィルタ) ---------- */
function rangeWindow(range){
  const t=parseDate(todayStr());
  if(range==="week"){ const dow=t.getDay(); const sun=new Date(t); sun.setDate(t.getDate()-dow); const sat=new Date(sun); sat.setDate(sun.getDate()+6); return {from:sun.getTime(), to:sat.getTime()}; }
  if(range==="month"){ const first=new Date(t.getFullYear(),t.getMonth(),1); const last=new Date(t.getFullYear(),t.getMonth()+1,0); return {from:first.getTime(), to:last.getTime()}; }
  if(range==="goal" && db.settings.goal) return {from:parseDate(db.settings.goal.start).getTime(), to:parseDate(db.settings.goal.end).getTime()};
  return {from:-Infinity, to:Infinity};
}
function statsData(range){
  const w=rangeWindow(range), map={}, colorOf=new Map(db.subjects.map(s=>[s.id,s.color]));
  let total=0;
  db.sessions.forEach(s=>{
    const d=parseDate(s.date).getTime();
    if(d<w.from||d>w.to) return;
    const k=s.subjectId;
    if(!map[k]) map[k]={name:(db.subjects.find(x=>x.id===k)||{}).name||"?", color:colorOf.get(k)||"#94A3B8", minutes:0};
    map[k].minutes+=s.durationMin; total+=s.durationMin;
  });
  return {slices:Object.values(map).sort((a,b)=>b.minutes-a.minutes), total};
}
function goalDone(g){ const from=parseDate(g.start).getTime(), to=parseDate(g.end).getTime(); let done=0; db.sessions.forEach(s=>{const d=parseDate(s.date).getTime(); if(d>=from&&d<=to)done+=s.durationMin;}); return done; }
function goalCardHTML(){
  const g=db.settings.goal; if(!g) return "";
  const done=goalDone(g), goalMin=g.hours*60, pct=goalMin?Math.round(done/goalMin*100):0, achieved=done>=goalMin;
  const today=parseDate(todayStr()).getTime(), DAY=86400000;
  const from=parseDate(g.start).getTime(), to=parseDate(g.end).getTime();
  let remainDays=0;
  if(today<from) remainDays=Math.round((to-from)/DAY)+1;
  else if(today<=to) remainDays=Math.round((to-today)/DAY)+1;
  const remainMin=Math.max(0,goalMin-done);
  let avg=null;
  if(today>=from){ const elapsed=Math.round((Math.min(today,to)-from)/DAY)+1; if(elapsed>0)avg=Math.round(done/elapsed); }
  let lines=[];
  if(achieved){ lines.push('<b style="color:var(--s3)">目標達成！</b> この調子で積み上げよう。'); if(avg!=null)lines.push("1日平均: "+formatMinutes(avg)); }
  else if(remainDays>0){ const need=Math.ceil(remainMin/remainDays); lines.push("残り <b>"+remainDays+"日</b> ・ 1日 <b>約"+formatMinutes(need)+"</b> ペースで達成"); if(avg!=null){ const j=avg>=need?'<span style="color:var(--s3)">今のペースで届く</span>':'<span style="color:var(--danger)">ペースアップが必要</span>'; lines.push("現在の1日平均 "+formatMinutes(avg)+" — "+j); } }
  else { lines.push("目標期間は終了しました。"); if(avg!=null)lines.push("期間中の1日平均: "+formatMinutes(avg)); }
  return '<div class="card"><div class="row" style="justify-content:space-between;align-items:baseline"><span style="font-weight:800;font-size:14px">'+esc(g.label)+'の目標</span><button class="link" data-act="editGoal">変更</button></div>'+
    '<div class="row" style="align-items:baseline;gap:10px;margin-top:6px"><span style="font-size:28px;font-weight:900;color:'+(achieved?"var(--s3)":"var(--text)")+'">'+pct+'%</span><span class="muted" style="font-size:13px;font-weight:700">'+formatMinutes(done)+' / '+g.hours+'時間</span></div>'+
    '<div class="baltrack" style="margin-top:8px"><div class="balfill" style="width:'+Math.min(100,pct)+'%;background:'+(achieved?"var(--s3)":"var(--accent)")+'"></div></div>'+
    '<p class="muted" style="font-size:12px;line-height:1.6;margin:10px 0 0">'+lines.join("<br>")+'</p></div>';
}

/* ---------- エクスポート / インポート ---------- */
function exportData(){
  const json=JSON.stringify(db,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`study-tracker-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const p=JSON.parse(reader.result);
      if(!p||typeof p!=="object") throw new Error("形式が違います");
      if(Array.isArray(p.entries) && ("school" in p || "examDate" in p)){
        // 旧kobe形式
        db=migrateFromKobe(p);
      } else if(Array.isArray(p.subjects) && Array.isArray(p.sessions)){
        // 新版系
        db=normalizeV2(p); db.settings.onboarded=true;
      } else {
        throw new Error("このアプリのバックアップではないようです");
      }
      saveDB(); setTheme(db.settings.theme||"midnight"); applyAccent();
      view={name:"home"}; modal=null; statsRange="week"; render();
      toast("バックアップを読み込みました");
    }catch(e){ alert("インポートに失敗しました: "+e.message); }
  };
  reader.onerror=()=>alert("ファイルの読み込みに失敗しました。");
  reader.readAsText(file);
}

/* ---------- ビジュアル部品 ---------- */
function ring(size,stroke,progress,colorVar,inner){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-clamp01(progress));
  const col=colorVar.startsWith("--")?`var(${colorVar})`:colorVar;
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--cardAlt)" stroke-width="${stroke}"/>
      <circle class="ringfg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset .5s ease"/>
    </svg><div class="ring-in">${inner||""}</div></div>`;
}
function radar(data,size,color){
  if(data.length<3) return "";
  const cx=size/2, cy=size/2, R=size/2-36, n=data.length;
  const ang=i=>Math.PI*2*i/n - Math.PI/2;
  const pt=(i,r)=>[cx+Math.cos(ang(i))*r, cy+Math.sin(ang(i))*r];
  let grid="";
  [0.25,0.5,0.75,1].forEach(f=>{ grid+=`<polygon points="${data.map((_,i)=>pt(i,R*f).map(v=>v.toFixed(1)).join(",")).join(" ")}" fill="none" stroke="var(--faint)" stroke-width="1"/>`; });
  let spokes=data.map((_,i)=>{const[x,y]=pt(i,R);return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--faint)" stroke-width="1"/>`;}).join("");
  const dpoly=data.map((d,i)=>pt(i,R*Math.max(0.02,clamp01(d.value))).map(v=>v.toFixed(1)).join(",")).join(" ");
  let labels=data.map((d,i)=>{const[x,y]=pt(i,R+15);const anchor=Math.abs(x-cx)<4?"middle":(x<cx?"end":"start");const lb=d.label.length>6?d.label.slice(0,6):d.label;return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="10" font-weight="700" fill="var(--subtext)" text-anchor="${anchor}" dominant-baseline="middle">${esc(lb)}</text>`;}).join("");
  return `<svg width="${size}" height="${size}">${grid}${spokes}<polygon points="${dpoly}" fill="${alpha(color,0.22)}" stroke="${color}" stroke-width="2"/>${labels}</svg>`;
}
function heatmap(mins){
  const today=parseDate(todayStr()), dow=today.getDay();
  const start=new Date(today); start.setDate(today.getDate()-dow-(HEAT_WEEKS-1)*7); // 左端=最も過去の週
  let cols="";
  for(let w=0;w<HEAT_WEEKS;w++){            // w=0 左端(過去)、右へ行くほど最近。右端が今週
    let cells="";
    for(let d=0;d<7;d++){
      const dt=new Date(start); dt.setDate(start.getDate()+w*7+d);
      const ds=toDateStr(dt), fut=dt>today, m=mins[ds]||0;
      const lvl=fut?-1:m===0?0:m<30?1:m<60?2:m<120?3:4;
      cells+=`<div class="heatcell" data-l="${lvl}" ${ds===todayStr()?'data-today="1"':""} title="${ds}: ${m}分"></div>`;
    }
    cols+=`<div class="heatcol">${cells}</div>`;
  }
  return `<div class="heatmap">${cols}</div>`;
}
function weeklyBars(days){
  const max=Math.max(60,...days.map(d=>d.total));
  return `<div class="wbars">`+days.map(d=>{
    const h=d.total===0?0:Math.max(6,d.total/max*110);
    const segs=d.segments.map(s=>`<div style="height:${(s.minutes/Math.max(1,d.total)*h).toFixed(1)}px;background:${s.color}"></div>`).join("");
    return `<div class="wbcol"><div class="wbtrack"><div class="wbstack" style="height:${h.toFixed(1)}px">${segs}</div></div><div class="wblabel" ${d.isToday?'data-today="1"':""}>${d.label}</div><div class="wbmin">${d.total||""}</div></div>`;
  }).join("")+`</div>`;
}

function go(v,dir){
  if(!dir){ const detail=["subject","topic","settings","exams"].includes(v.name); dir=detail?"push":"fade"; }
  navDir=dir; animNav=true; view=v; window.scrollTo(0,0); render();
}
function back(){
  if(view.name==="topic"){ const t=db.topics.find(x=>x.id===view.id); go(t?{name:"subject",id:t.subjectId}:{name:"subjects"},"pop"); }
  else if(view.name==="subject") go({name:"subjects"},"pop");
  else if(view.name==="exams") go({name:"settings"},"pop");
  else if(view.name==="settings") go({name:"home"},"pop");
  else go({name:"home"},"pop");
}
function openModal(type,data){ modal=Object.assign({type},data||{}); initModalState(); animOverlay=true; render(); }
function closeModal(){ modal=null; modalState={}; render(); }
function initModalState(){
  modalState={};
  if(modal.type==="subject"){ const s=modal.editingId?db.subjects.find(x=>x.id===modal.editingId):null; modalState={name:s?s.name:"",color:s?s.color:COLOR_CHOICES[0],icon:s?s.icon:ICON_CHOICES[0]}; }

  else if(modal.type==="save"){ modalState={content:"",reviewOn:true}; }
  else if(modal.type==="topic"){ modalState={name:""}; }
  else if(modal.type==="rename"){ const t=db.topics.find(x=>x.id===modal.topicId); modalState={name:t?t.name:""}; }
  else if(modal.type==="memo"){ const t=db.topics.find(x=>x.id===modal.topicId); modalState={memo:t&&t.memo?t.memo:""}; }
  else if(modal.type==="exam"){ const e=modal.editingId?db.exams.find(x=>x.id===modal.editingId):null; modalState={name:e?e.name:"",date:e?e.date:nextCommonTestDate()}; }

function render(){
  const app=document.getElementById("app");
  document.documentElement.setAttribute("data-theme", db.settings.theme||"midnight");
  applyAccent();
  if(!db.settings.onboarded){ if(!ob)ob={step:0,school:"",examName:"共通テスト",examDate:nextCommonTestDate(),selected:new Set()}; app.innerHTML=onboardingHTML(); flushToast(); return; }

  let inner, tb="";
  if(isTab(view.name)){
    inner = ({home:homeHTML,subjects:subjectsHTML,review:reviewHTML,record:recordHTML,stats:statsHTML}[view.name])();
    tb = tabbarHTML(view.name);
  } else {
    inner = ({subject:subjectHTML,topic:topicHTML,settings:settingsHTML,exams:examsHTML}[view.name])();
  }
  let html = `<div class="view-wrap${animNav?" view-enter view-enter-"+navDir:""}">${inner}</div>` + tb;
  if(modal) html += modalHTML();
  if(confettiOn) html += confettiHTML();
  app.innerHTML = html;
  animNav=false;

  // モーダル/シートの登場アニメ(初回表示時のみ)

  // タイマー稼働中は表示を即同期
  if(timer && view.name==="record") updateTimerDisplay();
  flushToast();
}

  const sd=statsData(range);
  const dates=lastNDateStrs(7);
  const days=dates.map(date=>{
    const rows=db.sessions.filter(s=>s.date===date);
    const bySub={};
    rows.forEach(r=>{bySub[r.subjectId]=(bySub[r.subjectId]||0)+r.durationMin;});
    return {date,label:WEEKDAY_JP[weekdayOf(date)],isToday:date===todayStr(),total:rows.reduce((a,r)=>a+r.durationMin,0),segments:Object.keys(bySub).map(k=>({color:colorOf.get(Number(k))||"var(--faint)",minutes:bySub[k]}))};
  });
  const tile=(l,v)=>`<div style="flex:1;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px var(--shadow);padding:14px;display:flex;flex-direction:column;justify-content:center;min-height:80px"><div class="muted" style="font-size:11px;font-weight:700">${l}</div><div style="font-size:17px;font-weight:900;margin-top:4px">${v}</div></div>`;

  const chipDefs=[["week","週間"],["month","月間"]];
  if(db.settings.goal) chipDefs.push(["goal",db.settings.goal.label]);
  chipDefs.push(["all","全期間"]);
  const chipHTML=`<div class="chips">${chipDefs.map(([k,l])=>`<button class="chip ${range===k?"on":""}" style="${range===k?"background:var(--accent);color:#fff":""}" data-act="statsRange:${k}">${esc(l)}</button>`).join("")}</div>`;

  let donutCard;
  if(!sd.slices.length){ donutCard=`<div class="card"><div class="muted center" style="font-size:13px">この期間の記録はまだありません</div></div>`; }
  else {
    const legend=sd.slices.map(x=>{const pct=Math.round(x.minutes/sd.total*100);return `<div class="leg"><span class="dot" style="width:10px;height:10px;background:${x.color}"></span><span class="lname clip">${esc(x.name)}</span><span class="lbar"><span class="lfill" style="width:${pct}%;background:${x.color}"></span></span><span class="muted" style="font-size:12px;font-weight:700">${formatMinutes(x.minutes)}</span><span class="lpct muted">${pct}%</span></div>`;}).join("");
    donutCard=`<div class="card"><div class="donutwrap">${donut(sd.slices,sd.total)}</div><div class="legend">${legend}</div></div>`;
  }

  return `<div class="screen safe-top"><div class="hd"><h1>統計</h1></div>
    <div class="row" style="gap:10px;align-items:stretch">${tile("累計学習",formatMinutes(tot.totalMinutes))}${tile("最長連続",streak.longest+"日")}${tile("完璧の分野",tot.perfectTopics)}</div>
    <div class="sect">期間別</div>${chipHTML}
    ${goalCardHTML()}
    ${donutCard}
    <div class="sect">この7日間</div><div class="card">${weeklyBars(days)}</div>
    ${subs.length>=3?`<div class="sect">科目レーダー(進捗%)</div><div class="card center">${radar(subs.map(s=>({label:s.name,value:subjectStats(s).progress})),270,getVarHex("--accent"))}</div>`:""}
    <div class="muted center" style="font-size:11px;margin-top:16px">記録回数 ${tot.sessionCount}回</div>
  </div>`;
}

/* ---------- コンフェッティ ---------- */
function confettiHTML(){
  const colors=["#4F86F7","#3FCF8E","#F2A83B","#E4506E","#A78BFA","#FB923C"];
  let p="";
  for(let i=0;i<64;i++){ const left=Math.random()*100,delay=Math.random()*0.6,dur=2.2+Math.random()*1.3,c=colors[i%colors.length],w=6+Math.random()*6; p+=`<i style="left:${left}%;background:${c};width:${w.toFixed(1)}px;height:${(w*0.6).toFixed(1)}px;animation-delay:${delay.toFixed(2)}s;animation-duration:${dur.toFixed(2)}s"></i>`; }
  return `<div class="confetti">${p}</div>`;
}

      <h1 class="obh1">本番から\n逆算しよう</h1>
      <p class="oblead">メインの試験日を設定すると、ホームに残り日数がずっと表示されます。</p>
      <div class="oblabel">志望校(任意)</div><input class="field" id="obSchool" value="${esc(ob.school||"")}" placeholder="例: 神戸大学">
      <div class="oblabel" style="margin-top:16px">試験名</div><input class="field" id="obName" value="${esc(ob.examName)}" placeholder="共通テスト">
      <div class="oblabel" style="margin-top:16px">試験日</div><input class="field" type="date" id="obDate" value="${esc(ob.examDate)}" min="${todayStr()}">
      <div class="muted" style="font-size:12px;margin-top:12px">あと ${daysUntil(ob.examDate)} 日 / あとから設定で変更できます</div>
    </div>`;
  } else if(ob.step===1){
    nextLabel=ob.selected.size>0?`次へ(${ob.selected.size}科目)`:"スキップして次へ";
    body=`<div class="obbody">
      <h1 class="obh1">科目を選ぼう</h1>
      <p class="oblead">入試の定番分野がテンプレで入ります。あとから自由に追加・削除できます。</p>
      <div class="grid">${SUBJECT_PRESETS.map(p=>{const on=ob.selected.has(p.name);return `<button class="pcell press" style="${on?`background:${alpha(p.color,0.14)};border-color:${p.color}`:""}" data-act="obToggle:${encodeURIComponent(p.name)}"><div class="picon" style="background:${alpha(p.color,0.18)}">${p.icon}</div><div class="grow" style="margin-left:10px;text-align:left"><div style="font-size:14px;font-weight:800">${esc(p.name)}</div><div class="muted" style="font-size:11px;margin-top:1px">${p.topics.length}分野</div></div>${on?`<span style="color:${p.color}">${icon("check",20)}</span>`:""}</button>`;}).join("")}</div>
    </div>`;
  } else {
    nextLabel="はじめる";
    const chosen=SUBJECT_PRESETS.filter(p=>ob.selected.has(p.name));
    body=`<div class="obbody">
      <h1 class="obh1">準備OK!</h1>
      <p class="oblead">この内容ではじめます。</p>
      <div class="card"><div class="muted" style="font-size:12px;font-weight:700">${esc(ob.examName.trim()||"共通テスト")}</div><div class="row" style="align-items:flex-end;margin-top:2px"><span style="font-size:40px;font-weight:900;font-variant-numeric:tabular-nums">${daysUntil(ob.examDate)}</span><span class="muted" style="font-size:14px;font-weight:700;margin:0 0 7px 4px">日後 / ${esc(formatDateJP(ob.examDate))}</span></div></div>
      ${chosen.length?`<div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">${chosen.map(p=>`<div class="card row" style="padding:10px 12px"><div class="picon" style="background:${alpha(p.color,0.18)}">${p.icon}</div><span class="grow" style="font-size:14px;font-weight:800;margin-left:10px">${esc(p.name)}</span><span class="muted" style="font-size:12px">${p.topics.length}分野</span></div>`).join("")}</div>`:`<div class="muted" style="font-size:13px;margin-top:12px">科目はあとから「科目」タブで追加できます。</div>`}
    </div>`;
  }
  return `<div class="obhd"><span style="font-size:15px;font-weight:900">受験進捗トラッカー</span>${dots}</div>${body}
    <div class="obfooter">${ob.step>0?`<button data-act="obBack" style="color:var(--subtext);font-size:15px;font-weight:700;padding:10px">戻る</button>`:'<div></div>'}<button class="btn" style="flex:1" data-act="obNext">${nextLabel}</button></div>`;
}

/* ============================================================
   タイマー処理
   ============================================================ */
function startTick(){ stopTick(); timerInt=setInterval(updateTimerDisplay,250); }
function stopTick(){ if(timerInt){clearInterval(timerInt);timerInt=null;} }
function timerElapsedMs(){ if(!timer) return 0; return timer.accumMs + (timer.running ? (Date.now()-timer.startedAt) : 0); }
function updateTimerDisplay(){
  if(!timer) return;
  const elapsed=Math.floor(timerElapsedMs()/1000);
  if(timer.mode==="countdown" && timer.running && elapsed>=timer.durationSec){ finishTimer(); return; }
  const num=document.getElementById("tNum"), lbl=document.getElementById("tLbl"), fg=document.querySelector(".runwrap .ringfg");
  if(!num) return;
  if(timer.mode==="countdown"){ num.textContent=fmtClock(Math.max(0,timer.durationSec-elapsed)); lbl.textContent=timer.running?"残り":"一時停止中"; }
  else { num.textContent=fmtClock(elapsed); lbl.textContent=timer.running?"経過":"一時停止中"; }
  if(fg){ const size=240,stroke=15,r=(size-stroke)/2,c=2*Math.PI*r; const prog=timer.mode==="countdown"?elapsed/timer.durationSec:(elapsed%3600)/3600; fg.style.strokeDashoffset=(c*(1-clamp01(prog))).toFixed(1); }
}
function startTimer(){
  if(recState.subject==null) return;
  let mn=Math.round(Number(recState.timerMin)); if(!(mn>0&&mn<=600)) mn=25; recState.timerMin=mn;
  timer={subjectId:recState.subject, topicId:recState.topic, mode:recState.mode, durationSec:mn*60, accumMs:0, startedAt:Date.now(), running:true};
  vibrate(10);
  render(); startTick();
}
function pauseTimer(){ if(!timer||!timer.running) return; timer.accumMs+=Date.now()-timer.startedAt; timer.running=false; stopTick(); vibrate(8); render(); }
function resumeTimer(){ if(!timer||timer.running) return; timer.startedAt=Date.now(); timer.running=true; vibrate(8); render(); startTick(); }
function finishTimer(){
  if(!timer) return;
  stopTick();
  const elapsedMs=timerElapsedMs();
  let sec=Math.floor(elapsedMs/1000);
  if(timer.mode==="countdown") sec=Math.min(sec, timer.durationSec);
  const min=Math.max(1,Math.round(sec/60));
  const info={subjectId:timer.subjectId, topicId:timer.topicId, startedAt:Date.now()-elapsedMs, min:min};
  timer=null;
  view={name:"record"};
  vibrate(8);
  openModal("save", info); // 保存シート(内容+復習トグル+ステージ)
}
function commitSave(){
  const content=(document.getElementById("saveContent")?document.getElementById("saveContent").value:"")||"";
  const min=modal.min, tid=modal.topicId;
  addSession(modal.subjectId, tid, new Date(modal.startedAt), min, content, modalState.reviewOn);
  modal=null; modalState={};
  vibrate([12,40,12]);
  render();
  toast(min+"分 記録しました");
  if(tid!=null) maybeConfetti(tid, (db.topics.find(x=>x.id===tid)||{}).stage);
}
function discardSave(){ if(confirm("この学習は記録されません。破棄しますか?")){ modal=null; modalState={}; render(); } }
function discardTimer(){ if(confirm("この学習は記録されません。破棄しますか?")){ stopTick(); timer=null; render(); } }
function vibrate(p){ if(navigator.vibrate) try{navigator.vibrate(p);}catch(e){} }

/* ============================================================
   イベント処理(委譲)
   ============================================================ */
const app=document.getElementById("app");

// 入力の同期(色ピック等で再描画してもテキストが消えないように)
app.addEventListener("input",e=>{
  if(e.target.id==="timerMinInput"){ const v=parseInt(e.target.value,10); if(Number.isFinite(v))recState.timerMin=v; return; }
  if(e.target.id==="soundVolInput"){
    const v=parseInt(e.target.value,10)||0; setSoundVol(v/100);
    const lbl=e.target.parentElement && e.target.parentElement.querySelector("span:last-child"); if(lbl) lbl.textContent=v+"%";
    return;
  }
  const m=e.target.getAttribute("data-model");
  if(m){ modalState[m]=e.target.value; }
});

// 長押し(科目/試験カード)
let pressTimer=null, longFired=false;
app.addEventListener("touchstart",handlePressStart,{passive:true});
app.addEventListener("mousedown",handlePressStart);
["touchend","touchmove","touchcancel","mouseup","mouseleave"].forEach(ev=>app.addEventListener(ev,()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} }));
function handlePressStart(e){
  const el=e.target.closest("[data-long]"); if(!el) return;
  longFired=false;
  pressTimer=setTimeout(()=>{ longFired=true; dispatch(el.getAttribute("data-long")); if(navigator.vibrate)navigator.vibrate(15); },500);
}

app.addEventListener("click",e=>{
  const stop=e.target.closest("[data-stop]");
  const el=e.target.closest("[data-act]");
  if(!el) return;
  // dialog内クリックはbackdropに伝播させない
  if(el.getAttribute("data-act")==="closeModal" && e.target.closest("[data-stop]")) return;
  if(longFired){ longFired=false; return; } // 長押し直後のクリック抑制
  const act=el.getAttribute("data-act");
  playSound(soundFor(act));
  dispatch(act, e);
});
function soundFor(act){
  const cmd=act.split(":")[0];
  if(["back","discardTimer","discardSave","closeModal"].includes(cmd)) return "back";
  if(["markDone","commitSave","submitManual","submitModal","finishTimer"].includes(cmd)) return "success";
  if(["delSession","deleteSubjectC","undoReview","resetAccent","deleteGoal"].includes(cmd)) return "toggle";
  if(cmd==="toggleReview") return "toggle";
  if(["setTheme","setAccent","recMode","recMin","mColor","mIcon","mPreset","statsRange","recSub","recTop","saveStage","sheetStage","setStage","tab","pauseTimer","resumeTimer","startTimer"].includes(cmd)) return "select";
  return "tap";
}

function dispatch(act,e){
  const [cmd,a,b]=act.split(":");
  switch(cmd){
    case "tab": go({name:a}); break;
    case "nav":
      if(a==="subject") go({name:"subject",id:Number(b)});
      else if(a==="topic") go({name:"topic",id:Number(b)});
      else go({name:a});
      break;
    case "back": back(); break;

    case "addSubject": openModal("subject",{}); break;
    case "editSubject": openModal("subject",{editingId:Number(a)}); break;
    case "subjMenu": subjectMenu(Number(a)); break;
    case "archiveSubject": archiveSubject(Number(a)); render(); break;
    case "archiveSubjectC": archiveSubject(Number(a)); modal=null; render(); toast("アーカイブしました（一覧下部から戻せます）"); break;
    case "unarchiveSubject": unarchiveSubject(Number(a)); render(); toast("科目を一覧に戻しました"); break;
    case "deleteSubjectC": if(confirm("この科目の分野と学習記録も削除されます。よろしいですか?")){ deleteSubject(Number(a)); modal=null; render(); toast("削除しました"); } break;
    case "deleteSubject": if(confirm("この科目の分野と学習記録も削除されます。よろしいですか?")){ deleteSubject(Number(a)); go({name:"subjects"}); } break;

    case "addTopic": openModal("topic",{subjectId:Number(a)}); break;
    case "stage": openModal("stage",{topicId:Number(a)}); break;
    case "rename": openModal("rename",{topicId:Number(a)}); break;
    case "memo": openModal("memo",{topicId:Number(a)}); break;
    case "setStage": { const id=Number(a),to=Number(b); setTopicStage(id,to); render(); maybeConfetti(id,to); } break;
    case "deleteTopic": if(confirm("この分野を削除しますか?学習記録の科目集計は残ります。")){ const sid=(db.topics.find(t=>t.id===Number(a))||{}).subjectId; deleteTopic(Number(a)); go({name:"subject",id:sid}); } break;

    case "setTheme": setTheme(a); render(); break;
    case "setAccent": setAccentColor("#"+a); break;
    case "resetAccent": resetAccentColor(); break;
    case "export": exportData(); break;
    case "import": document.getElementById("importFile").click(); break;

    case "setSchool": openModal("school",{}); break;
    case "toggleSound": setSoundOn(!db.settings.soundOn); break;
    case "testSound": playSound("success"); break;
    case "editGoal": openModal("goal",{}); break;
    case "deleteGoal": if(confirm("目標を削除しますか?")){ db.settings.goal=null; saveDB(); render(); toast("目標を削除しました"); } break;

    // 復習
    case "markDone": { markReviewDone(Number(a),b); render(); toast("復習を完了にしました"); } break;
    case "undoReview": { undoReview(Number(a),b); render(); toast("復習を未完了に戻しました"); } break;
    case "delSession": { const s=db.sessions.find(x=>x.id===Number(a)); if(s&&confirm((s.content?"「"+s.content+"」":formatMinutes(s.durationMin)+"の記録")+"を削除しますか?")){ deleteSession(Number(a)); render(); toast("記録を削除しました"); } } break;

    case "addExam": openModal("exam",{}); break;
    case "editExam": openModal("exam",{editingId:Number(a)}); break;
    case "deleteExam": { const ex=db.exams.find(x=>x.id===Number(a)); if(ex&&confirm(`「${ex.name}」を削除しますか?`)){ deleteExam(Number(a)); render(); } } break;
    case "primaryExam": setPrimaryExam(Number(a)); render(); break;

    // 記録セットアップ
    case "recSub": recState.subject=Number(a); recState.topic=null; render(); break;
    case "recTop": recState.topic=(a==="0"?null:Number(a)); render(); break;
    case "recMode": recState.mode=a; render(); break;
    case "recMin": recState.timerMin=Number(a); render(); break;
    case "statsRange": statsRange=a; render(); break;
    case "startTimer": startTimer(); break;
    case "pauseTimer": pauseTimer(); break;
    case "resumeTimer": resumeTimer(); break;
    case "finishTimer": finishTimer(); break;
    case "discardTimer": discardTimer(); break;
    case "manual": openModal("manual",{}); break;

    // モーダル
    case "mColor": modalState.color=decodeURIComponent(a); render(); break;
    case "mIcon": modalState.icon=decodeURIComponent(a); render(); break;
    case "mPreset": modalState.preset=Number(a); modalState.custom=""; render(); break;
    case "submitModal": submitModal(); break;
    case "submitManual": submitManual(); break;
    case "sheetStage": sheetStage(Number(a)); break;
    case "toggleReview": modalState.reviewOn=!modalState.reviewOn; render(); break;
    case "saveStage": setTopicStage(modal.topicId, Number(a)); render(); break;
    case "commitSave": commitSave(); break;
    case "discardSave": discardSave(); break;
    case "closeModal": closeModal(); break;

    // オンボーディング
    case "obNext": obNext(); break;
    case "obBack": obSyncInputs(); ob.step--; render(); break;
    case "obToggle": { const n=decodeURIComponent(a); if(ob.selected.has(n))ob.selected.delete(n);else ob.selected.add(n); render(); } break;
  }
}

/* 科目長押しメニュー(confirmベース) */
function subjectMenu(id){ const s=db.subjects.find(x=>x.id===id); if(!s) return; openModal("subjmenu",{subjectId:id}); }

function submitModal(){
  const t=modal.type;
  if(t==="subject"){
    const name=(document.getElementById("mName").value||"").trim(); if(!name)return;
    if(modal.editingId) updateSubject(modal.editingId,{name,color:modalState.color,icon:modalState.icon});
    else createSubject(name,modalState.color,modalState.icon);
    closeModal();
  } else if(t==="topic"){
    const name=(document.getElementById("mName").value||"").trim(); if(!name)return;
    createTopic(modal.subjectId,name); closeModal();
  } else if(t==="rename"){
    const name=(document.getElementById("mName").value||"").trim(); if(!name)return;
    renameTopic(modal.topicId,name); closeModal();
  } else if(t==="memo"){
    setTopicMemo(modal.topicId, document.getElementById("mMemo").value||""); closeModal();
  } else if(t==="exam"){
    const name=(document.getElementById("mName").value||"").trim(); const date=document.getElementById("mDate").value; if(!name||!date)return;
    if(modal.editingId) updateExam(modal.editingId,name,date);
    else addExam(name,date,db.exams.length===0);
    closeModal();
  } else if(t==="goal"){
    const label=(document.getElementById("gLabel").value||"").trim()||"目標";
    const start=document.getElementById("gStart").value, end=document.getElementById("gEnd").value;
    const hours=Number((document.getElementById("gHours").value||"").trim());
    if(!start||!end||!(hours>0)){ toast("開始日・終了日・時間を入力してください"); return; }
    if(start>end){ toast("終了日は開始日より後にしてください"); return; }
    db.settings.goal={label,start,end,hours}; saveDB(); closeModal(); toast("目標を設定しました");
  } else if(t==="school"){
    const v=(document.getElementById("schoolInput").value||"").trim();
    db.settings.school=v||null; saveDB(); closeModal();
  }
}
function submitManual(){
  const custom=(document.getElementById("mCustom").value||"").trim();
  const min=custom?Number(custom):modalState.preset;
  if(!(Number.isFinite(min)&&min>0&&min<=1440)) return;
  const content=(document.getElementById("mContentManual")?document.getElementById("mContentManual").value:"")||"";
  const dateEl=document.getElementById("mDateManual");
  const dateStr=(dateEl&&dateEl.value)?dateEl.value:todayStr();
  const started=/^\d{4}-\d{2}-\d{2}$/.test(dateStr)?new Date(dateStr+"T12:00:00"):new Date();
  const sub=recState.subject, top=recState.topic, m=Math.round(min);
  addSession(sub, top, started, m, content, modalState.reviewOn);
  modal=null; modalState={};
  vibrate([12,40,12]);
  render();
  toast(m+"分 記録しました");
  if(top!=null) maybeConfetti(top, (db.topics.find(x=>x.id===top)||{}).stage);
}
function sheetStage(to){
  const id=modal.topicId;
  setTopicStage(id,to);
  const fromTimer=modal.fromTimer;
  modal=null; render();
  maybeConfetti(id,to);
}
function allPerfectOfTopic(id){ return false; }
function maybeConfetti(id,to){
  if(to!==3) return;
  const t=db.topics.find(x=>x.id===id); if(!t) return;
  const siblings=db.topics.filter(x=>x.subjectId===t.subjectId);
  if(siblings.length>0 && siblings.every(x=>x.stage===3)) fireConfetti();
}

/* オンボーディング遷移 */
function obSyncInputs(){
  const sc=document.getElementById("obSchool"); if(sc)ob.school=sc.value;
  const n=document.getElementById("obName"); if(n)ob.examName=n.value;
  const d=document.getElementById("obDate"); if(d&&d.value)ob.examDate=d.value;
}
function obNext(){
  obSyncInputs();
  if(ob.step<2){ ob.step++; render(); return; }
  // 完了
  if(ob.school&&ob.school.trim()) db.settings.school=ob.school.trim();
  addExam(ob.examName.trim()||"共通テスト", ob.examDate, true);
  SUBJECT_PRESETS.forEach(p=>{ if(ob.selected.has(p.name)){ const sid=createSubject(p.name,p.color,p.icon); createTopicsBulk(sid,p.topics); } });
  db.settings.onboarded=true; saveDB();
  ob=null; view={name:"home"}; render();
}

/* ---------- アクセント色 / テーマ色ピッカー ---------- */
document.addEventListener("change",e=>{
  if(e.target && e.target.id==="accentInput"){ setAccentColor(e.target.value); }
  else if(e.target && e.target.id==="themeBaseInput"){ setThemeBase(e.target.value); }
  else if(e.target && e.target.id==="subjColorInput"){ modalState.color=e.target.value; render(); }
  else if(e.target && e.target.id==="soundVolInput"){ playSound("select"); }
});

/* ---------- ファイル選択(インポート) ---------- */
document.addEventListener("change",e=>{
  if(e.target && e.target.id==="importFile" && e.target.files && e.target.files[0]){
    importData(e.target.files[0]); e.target.value="";
  }
});

/* ---------- 起動 ---------- */
render();
</script>
