            (entry.compressed ? toBase64(finalBytes) : entry.data);

    // consumers read these Blobs directly. Survives the swap like the error sink.

      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

      old.replaceWith(s);

    }

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);

255},${n&255},${a})`;\n}\nfunction clamp01(x){return Math.max(0,Math.min(1,x));}\n\n/* ---------- 日付 ---------- */\nfunction pad(n){return String(n).padStart(2,\"0\");}\nfunction toDateStr(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}\nfunction todayStr(){return toDateStr(new Date());}\nfunction parseDate(s){const [y,m,d]=s.split(\"-\").map(Number);return new Date(y,m-1,d);}\nfunction daysUntil(s){return Math.round((parseDate(s)-parseDate(todayStr()))/86400000);}\nfunction shiftDate(s,days){const d=parseDate(s);d.setDate(d.getDate()+days);return toDateStr(d);}\nfunction lastNDateStrs(n){const a=[],t=parseDate(todayStr());for(let i=n-1;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);a.push(toDateStr(d));}return a;}\nconst WEEKDAY_JP=[\"日\",\"月\",\"火\",\"水\",\"木\",\"金\",\"土\"];\nfunction weekdayOf(s){return parseDate(s).getDay();}\nfunction formatDateJP(s){const d=parseDate(s);return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${WEEKDAY_JP[d.getDay()]})`;}\nfunction formatMinutes(m){if(m<60)return `${m}分`;const h=Math.floor(m/60),mm=m%60;return mm===0?`${h}時間`:`${h}時間${mm}分`;}\nfunction fmtIso(iso){if(!iso)return \"—\";const d=new Date(iso);return isNaN(d)?\"—\":formatDateJP(toDateStr(d));}\nfunction fmtClock(sec){sec=Math.max(0,sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h>0?`${h}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;}\nfunction nextCommonTestDate(){\n  const now=new Date();\n  for(let yr=now.getFullYear();yr<=now.getFullYear()+1;yr++){\n    const jan1=new Date(yr,0,1), firstSat=(6-jan1.getDay()+7)%7;\n    const ds=toDateStr(new Date(yr,0,1+firstSat+14)); // 1月第3土曜\n    if(daysUntil(ds)>=0) return ds;\n  }\n  return toDateStr(new Date(now.getFullYear()+1,0,18));\n}\n\n/* ---------- データ層(localStorage) ---------- */\nfunction defaultDB(){return {schemaVersion:2, seq:0, settings:{theme:\"midnight\",onboarded:false,school:null,customAccent:null,customTheme:\"#4F86F7\",goal:null,soundOn:true,soundVol:0.5}, subjects:[], topics:[], sessions:[], exams:[]};}\nfunction normalizeV2(p){\n  const d=Object.assign(defaultDB(), p);\n  d.settings=Object.assign(defaultDB().settings, p.settings||{});\n  d.schemaVersion=2;\n  d.sessions=(p.sessions||[]).map(s=>Object.assign({topicId:null,content:null,reviews:null}, s));\n  return d;\n}\nfunction migrateFromKobe(old){\n  const d=defaultDB();\n  let seq=0; const nid=()=>(++seq);\n  d.settings.onboarded=true;\n  d.settings.school=(typeof old.school===\"string\"&&old.school.trim())?old.school.trim():null;\n  d.settings.customAccent=(typeof old.themeColor===\"string\"&&/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(old.themeColor))?old.themeColor:null;\n  if(typeof old.summerGoalHours===\"number\"&&old.summerGoalHours>0){ d.settings.goal={label:\"夏期\",start:\"2026-07-01\",end:\"2026-08-31\",hours:old.summerGoalHours}; }\n  const examDate=old.examDate||\"2027-01-17\";\n  d.exams=[{id:nid(),name:(d.settings.school?d.settings.school+\" 本番\":\"入試 本番\"),date:examDate,isPrimary:true}];\n  const nameToId={};\n  (old.subjects||[]).forEach((s,i)=>{ const id=nid(); d.subjects.push({id,name:s.name,color:(s.color||\"#4F86F7\"),icon:\"📘\",order:i,archived:false,createdAt:new Date().toISOString()}); nameToId[s.name]=id; });\n  (old.entries||[]).forEach(e=>{\n    let sid=nameToId[e.subject];\n    if(sid==null){ const id=nid(); d.subjects.push({id,name:e.subject||\"その他\",color:(e.color||\"#94A3B8\"),icon:\"📘\",order:d.subjects.length,archived:false,createdAt:new Date().toISOString()}); nameToId[e.subject]=id; sid=id; }\n    const ds=e.date||todayStr();\n    d.sessions.push({ id:nid(), subjectId:sid, topicId:null, date:ds, startedAt:ds+\"T12:00:00.000Z\", durationMin:(e.minutes||0),\n      content:(typeof e.content===\"string\"&&e.content.trim())?e.content:null,\n      reviews:(e.reviews&&typeof e.reviews===\"object\")?{day1:!!e.reviews.day1,week1:!!e.reviews.week1,month1:!!e.reviews.month1}:{day1:false,week1:false,month1:false} });\n  });\n  d.seq=seq;\n  return d;\n}\nfunction loadDB(){\n  try{\n    const raw=localStorage.getItem(DB_KEY);\n    if(raw){ const p=JSON.parse(raw); return (p&&p.schemaVersion>=2)?normalizeV2(p):normalizeV2(p); }\n    const oldRaw=localStorage.getItem(OLD_KEY);\n    if(oldRaw){ const old=JSON.parse(oldRaw); if(old&&Array.isArray(old.subjects)&&Array.isArray(old.entries)){ pendingToast=\"以前のトラッカーのデータを引き継ぎました\"; migrationPersist=true; return migrateFromKobe(old); } }\n  }catch(e){ console.warn(\"load失敗\",e); }\n  return defaultDB();\n}\nfunction saveDB(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){ alert(\"保存に失敗しました。ブラウザのプライベートモードではデータが保存されません。\"); } }\nlet db = loadDB();\nif(migrationPersist){ try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){} }\n\n/* ---------- 派生値 ---------- */\nfunction activeSubjects(){ return db.subjects.filter(s=>!s.archived).sort((a,b)=>a.order-b.order); }\nfunction subjectStats(sub){\n  const ts=db.topics.filter(t=>t.subjectId===sub.id);\n  const stageSum=ts.reduce((a,t)=>a+t.stage,0);\n  const perfect=ts.filter(t=>t.stage===3).length;\n  return {topicCount:ts.length, stageSum, perfectCount:perfect, progress:ts.length?stageSum/(3*ts.length):0};\n}\nfunction topicsOf(sid){ return db.topics.filter(t=>t.subjectId===sid).sort((a,b)=>a.order-b.order); }\nfunction topicMinutes(tid){ return db.sessions.filter(s=>s.topicId===tid).reduce((a,s)=>a+s.durationMin,0); }\nfunction minutesByDate(){ const m={}; db.sessions.forEach(s=>{m[s.date]=(m[s.date]||0)+s.durationMin;}); return m; }\nfunction totals(){ return {totalMinutes:db.sessions.reduce((a,s)=>a+s.durationMin,0), perfectTopics:db.topics.filter(t=>t.stage===3).length, sessionCount:db.sessions.length}; }\nfunction computeStreak(){\n  const dates=new Set(db.sessions.map(s=>s.date));\n  const today=todayStr();\n  let cur=0, cursor = dates.has(today)?today : (dates.has(shiftDate(today,-1))?shiftDate(today,-1):null);\n  while(cursor && dates.has(cursor)){ cur++; cursor=shiftDate(cursor,-1); }\n  let longest=0, run=0, prev=null;\n  [...dates].sort().forEach(d=>{ run = (prev && shiftDate(prev,1)===d)?run+1:1; longest=Math.max(longest,run); prev=d; });\n  return {current:cur, longest, studiedToday:dates.has(today)};\n}\nfunction primaryExam(){\n  if(!db.exams.length) return null;\n  const p=db.exams.find(e=>e.isPrimary); if(p) return p;\n  const fut=db.exams.filter(e=>daysUntil(e.date)>=0).sort((a,b)=>daysUntil(a.date)-daysUntil(b.date));\n  return fut[0]||db.exams.slice().sort((a,b)=>a.date<b.date?1:-1)[0];\n}\nfunction otherExams(primaryId){ return db.exams.filter(e=>e.id!==primaryId).sort((a,b)=>a.date<b.date?-1:1); }\n\n/* ---------- ミューテーション ---------- */\nfunction createSubject(name,color,icon){ const id=uid(); db.subjects.push({id,name,color,icon,order:db.subjects.length,archived:false,createdAt:new Date().toISOString()}); saveDB(); return id; }\nfunction updateSubject(id,patch){ const s=db.subjects.find(x=>x.id===id); if(s)Object.assign(s,patch); saveDB(); }\nfunction archiveSubject(id){ const s=db.subjects.find(x=>x.id===id); if(s)s.archived=true; saveDB(); }\nfunction unarchiveSubject(id){ const s=db.subjects.find(x=>x.id===id); if(s)s.archived=false; saveDB(); }\nfunction deleteSubject(id){ db.subjects=db.subjects.filter(s=>s.id!==id); const tids=db.topics.filter(t=>t.subjectId===id).map(t=>t.id); db.topics=db.topics.filter(t=>t.subjectId!==id); db.sessions=db.sessions.filter(se=>se.subjectId!==id); saveDB(); }\nfunction createTopic(sid,name){ const id=uid(); const n=db.topics.filter(t=>t.subjectId===sid).length; db.topics.push({id,subjectId:sid,name,stage:0,memo:null,order:n,lastStudiedAt:null,stageUpdatedAt:null,createdAt:new Date().toISOString()}); saveDB(); return id; }\nfunction createTopicsBulk(sid,names){ names.forEach(n=>createTopic(sid,n)); }\nfunction renameTopic(id,name){ const t=db.topics.find(x=>x.id===id); if(t)t.name=name; saveDB(); }\nfunction setTopicMemo(id,memo){ const t=db.topics.find(x=>x.id===id); if(t)t.memo=memo.trim()?memo:null; saveDB(); }\nfunction deleteTopic(id){ db.topics=db.topics.filter(t=>t.id!==id); saveDB(); }\nfunction setTopicStage(id,to){ const t=db.topics.find(x=>x.id===id); if(!t||t.stage===to)return; t.stage=to; t.stageUpdatedAt=new Date().toISOString(); saveDB(); }\nfunction addSession(sub,top,startedAt,min,content,reviewOn){ db.sessions.push({id:uid(),subjectId:sub,topicId:top,date:toDateStr(startedAt),startedAt:startedAt.toISOString(),durationMin:min,content:(content&&content.trim())?content.trim():null,reviews:reviewOn?{day1:false,week1:false,month1:false}:null}); if(top!=null){const t=db.topics.find(x=>x.id===top); if(t)t.lastStudiedAt=startedAt.toISOString();} saveDB(); }\nfunction markReviewDone(sid,key){ const s=db.sessions.find(x=>x.id===sid); if(s&&s.reviews){ s.reviews[key]=true; saveDB(); } }\nfunction undoReview(sid,key){ const s=db.sessions.find(x=>x.id===sid); if(s&&s.reviews){ s.reviews[key]=false; saveDB(); } }\nfunction deleteSession(id){ db.sessions=db.sessions.filter(s=>s.id!==id); saveDB(); }\nfunction addExam(name,date,primary){ if(primary)db.exams.forEach(e=>e.isPrimary=false); db.exams.push({id:uid(),name,date,isPrimary:!!primary}); saveDB(); }\nfunction updateExam(id,name,date){ const e=db.exams.find(x=>x.id===id); if(e){e.name=name;e.date=date;} saveDB(); }\nfunction setPrimaryExam(id){ db.exams.forEach(e=>e.isPrimary=(e.id===id)); saveDB(); }\nfunction deleteExam(id){ db.exams=db.exams.filter(e=>e.id!==id); saveDB(); }\nfunction setTheme(key){ db.settings.theme=key; saveDB(); document.documentElement.setAttribute(\"data-theme\",key); applyAccent(); }\n\n/* ---------- アクセント色 / カスタムテーマ ---------- */\nfunction hexToHsl(hex){\n  let c=String(hex||\"\").replace(\"#\",\"\"); if(c.length===3)c=c.split(\"\").map(x=>x+x).join(\"\");\n  const r=parseInt(c.substr(0,2),16)/255,g=parseInt(c.substr(2,2),16)/255,b=parseInt(c.substr(4,2),16)/255;\n  const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h=0,s=0,l=(mx+mn)/2;\n  if(mx!==mn){ const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn); if(mx===r)h=(g-b)/d+(g<b?6:0); else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; }\n  return {h:h||0, s:s*100, l:l*100};\n}\nfunction hslToHex(h,s,l){\n  s/=100; l/=100; const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);\n  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));\n  const to=x=>{const v=Math.round(x*255); return v.toString(16).padStart(2,\"0\");};\n  return \"#\"+to(f(0))+to(f(8))+to(f(4));\n}\nconst CUSTOM_VARS=[\"--bg\",\"--card\",\"--cardAlt\",\"--faint\",\"--text\",\"--subtext\",\"--heat\",\"--s1\"];\nfunction applyThemeVars(){\n  const root=document.documentElement;\n  CUSTOM_VARS.forEach(p=>root.style.removeProperty(p));\n  if(db.settings.theme===\"custom\"){\n    const base=db.settings.customTheme||\"#4F86F7\", c=hexToHsl(base), sat=Math.max(16,Math.min(52,c.s));\n    root.style.setProperty(\"--bg\",      hslToHex(c.h,Math.min(sat,42),11));\n    root.style.setProperty(\"--card\",    hslToHex(c.h,Math.min(sat,40),16));\n    root.style.setProperty(\"--cardAlt\", hslToHex(c.h,Math.min(sat,38),22));\n    root.style.setProperty(\"--faint\",   hslToHex(c.h,Math.min(sat,36),29));\n    root.style.setProperty(\"--text\",    hslToHex(c.h,18,96));\n    root.style.setProperty(\"--subtext\", hslToHex(c.h,14,70));\n    root.style.setProperty(\"--heat\",    base);\n    root.style.setProperty(\"--s1\",      base);\n  }\n}\nfunction applyAccent(){\n  applyThemeVars();\n  const a=db.settings.customAccent, root=document.documentElement;\n  if(a && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(a)) root.style.setProperty(\"--accent\", a);\n  else if(db.settings.theme===\"custom\") root.style.setProperty(\"--accent\", db.settings.customTheme||\"#4F86F7\");\n  else root.style.removeProperty(\"--accent\");\n}\nfunction setAccentColor(hex){ db.settings.customAccent=hex; saveDB(); applyAccent(); render(); }\nfunction resetAccentColor(){ db.settings.customAccent=null; saveDB(); applyAccent(); render(); }\nfunction setThemeBase(hex){ db.settings.customTheme=hex; db.settings.theme=\"custom\"; saveDB(); applyAccent(); render(); }\n\n/* ---------- 効果音(Web Audioで合成・外部ファイル不要) ---------- */\nlet _audioCtx=null;\nfunction audioCtx(){\n  if(_audioCtx) return _audioCtx;\n  const AC=window.AudioContext||window.webkitAudioContext;\n  if(!AC) return null;\n  try{ _audioCtx=new AC(); }catch(e){ return null; }\n  return _audioCtx;\n}\n// type: tap(軽いクリック) / select(選択) / success(完了・記録) / back / toggle / error\nfunction playSound(type){\n  if(!db.settings.soundOn) return;\n  const vol=(typeof db.settings.soundVol===\"number\"?db.settings.soundVol:0.5);\n  if(vol<=0) return;\n  const ctx=audioCtx(); if(!ctx) return;\n  if(ctx.state===\"suspended\"){ try{ctx.resume();}catch(e){} }\n  const now=ctx.currentTime;\n  const notes={\n    tap:[[880,0.05]],\n    select:[[660,0.06]],\n    toggle:[[740,0.05]],\n    back:[[520,0.07]],\n    success:[[784,0.09],[1175,0.14]],   // G5 → D6 の上行\n    error:[[300,0.12],[220,0.16]],       // 下行\n  }[type]||[[880,0.05]];\n  const master=ctx.createGain();\n  master.gain.value=Math.max(0,Math.min(1,vol))*0.32; // 全体の上限を抑える\n  master.connect(ctx.destination);\n  notes.forEach((n,i)=>{\n    const [freq,dur]=n, t0=now+i*0.06;\n    const osc=ctx.createOscillator(), g=ctx.createGain();\n    osc.type=\"sine\"; osc.frequency.value=freq;\n    g.gain.setValueAtTime(0.0001,t0);\n    g.gain.exponentialRampToValueAtTime(1,t0+0.008);   // 速いアタック\n    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); // なめらかな減衰\n    osc.connect(g); g.connect(master);\n    osc.start(t0); osc.stop(t0+dur+0.02);\n  });\n}\nfunction setSoundOn(on){ db.settings.soundOn=on; saveDB(); if(on)playSound(\"select\"); render(); }\nfunction setSoundVol(v){ db.settings.soundVol=Math.max(0,Math.min(1,v)); saveDB(); }\n\n/* ---------- トースト ---------- */\nlet toastTimer=null;\nfunction toast(msg){\n  let el=document.getElementById(\"toastBar\");\n  if(!el){ el=document.createElement(\"div\"); el.id=\"toastBar\"; el.className=\"toast\"; document.body.appendChild(el); }\n  el.textContent=msg; el.classList.add(\"show\");\n  if(toastTimer)clearTimeout(toastTimer);\n  toastTimer=setTimeout(()=>el.classList.remove(\"show\"),2200);\n}\n\n/* ---------- 復習(エビングハウス) ---------- */\nfunction dueItems(){\n  const t=parseDate(todayStr()).getTime(), DAY=86400000;\n  const due=[], up=[];\n  db.sessions.forEach(s=>{\n    if(!s.reviews) return;\n    STAGES.forEach(st=>{\n      if(s.reviews[st.key]) return;\n      const dd=parseDate(shiftDate(s.date,st.days)).getTime();\n      const item={s,st,dd,over:dd<t};\n      if(dd<=t) due.push(item);\n      else if(dd<=t+7*DAY) up.push(item);\n    });\n  });\n  due.sort((a,b)=>a.dd-b.dd||a.st.days-b.st.days);\n  up.sort((a,b)=>a.dd-b.dd);\n  return {due,up};\n}\nfunction dueCount(){ return dueItems().due.length; }\nfunction completedReviews(){\n  const list=[];\n  db.sessions.forEach(s=>{ if(!s.reviews) return; STAGES.forEach(st=>{ if(s.reviews[st.key]) list.push({s,st,dd:parseDate(shiftDate(s.date,st.days)).getTime()}); }); });\n  list.sort((a,b)=>b.dd-a.dd);\n  return list;\n}\nfunction recentSessions(n){ return db.sessions.slice().sort((a,b)=>String(b.startedAt||\"\").localeCompare(String(a.startedAt||\"\"))).slice(0,n); }\nfunction sessionLabel(s){\n  if(s.content && s.content.trim()) return s.content;\n  const sub=db.subjects.find(x=>x.id===s.subjectId);\n  const top=s.topicId!=null?db.topics.find(x=>x.id===s.topicId):null;\n  if(sub&&top) return sub.name+\"（\"+top.name+\"）\";\n  if(sub) return sub.name;\n  return \"学習記録\";\n}\nfunction subjectColor(id){ const s=db.subjects.find(x=>x.id===id); return s?s.color:\"#8AA2FF\"; }\nfunction subjectNameOf(id){ const s=db.subjects.find(x=>x.id===id); return s?s.name:\"?\"; }\nfunction reviewTitle(s){\n  if(s.content && s.content.trim()) return s.content;\n  const top=s.topicId!=null?db.topics.find(x=>x.id===s.topicId):null;\n  if(top) return top.name;\n  return \"学習記録\";\n}\n\n/* ---------- ドーナツ(手描きSVG) ---------- */\nfunction polar(cx,cy,r,deg){ const rad=deg*Math.PI/180; return [cx+r*Math.sin(rad), cy-r*Math.cos(rad)]; }\nfunction arc(cx,cy,rO,rI,a0,a1){\n  const large=(a1-a0)>180?1:0;\n  const o0=polar(cx,cy,rO,a0),o1=polar(cx,cy,rO,a1),i1=polar(cx,cy,rI,a1),i0=polar(cx,cy,rI,a0);\n  return \"M \"+o0[0].toFixed(2)+\" \"+o0[1].toFixed(2)+\" A \"+rO+\" \"+rO+\" 0 \"+large+\" 1 \"+o1[0].toFixed(2)+\" \"+o1[1].toFixed(2)+\n         \" L \"+i1[0].toFixed(2)+\" \"+i1[1].toFixed(2)+\" A \"+rI+\" \"+rI+\" 0 \"+large+\" 0 \"+i0[0].toFixed(2)+\" \"+i0[1].toFixed(2)+\" Z\";\n}\nfunction donut(slices,total){\n  const cx=100,cy=100,rO=84,rI=52;\n  const center='<text x=\"100\" y=\"96\" text-anchor=\"middle\" class=\"donutTot\">'+esc(fmtHM(total))+'<\u002Ftext><text x=\"100\" y=\"115\" text-anchor=\"middle\" class=\"donutLbl\">合計<\u002Ftext>';\n  if(!slices.length) return \"\";\n  if(slices.length===1) return '<svg viewBox=\"0 0 200 200\" class=\"donut\"><circle cx=\"100\" cy=\"100\" r=\"'+rO+'\" fill=\"'+slices[0].color+'\"/><circle cx=\"100\" cy=\"100\" r=\"'+rI+'\" fill=\"var(--card)\"/>'+center+'<\u002Fsvg>';\n  let a=0,paths=\"\";\n  slices.forEach(s=>{ const sweep=s.minutes/total*360; paths+='<path d=\"'+arc(cx,cy,rO,rI,a,a+sweep)+'\" fill=\"'+s.color+'\" stroke=\"var(--card)\" stroke-width=\"2\"/>'; a+=sweep; });\n  return '<svg viewBox=\"0 0 200 200\" class=\"donut\">'+paths+center+'<\u002Fsvg>';\n}\n\n/* ---------- 統計データ(期間フィルタ) ---------- */\nfunction rangeWindow(range){\n  const t=parseDate(todayStr());\n  if(range===\"week\"){ const dow=t.getDay(); const sun=new Date(t); sun.setDate(t.getDate()-dow); const sat=new Date(sun); sat.setDate(sun.getDate()+6); return {from:sun.getTime(), to:sat.getTime()}; }\n  if(range===\"month\"){ const first=new Date(t.getFullYear(),t.getMonth(),1); const last=new Date(t.getFullYear(),t.getMonth()+1,0); return {from:first.getTime(), to:last.getTime()}; }\n  if(range===\"goal\" && db.settings.goal) return {from:parseDate(db.settings.goal.start).getTime(), to:parseDate(db.settings.goal.end).getTime()};\n  return {from:-Infinity, to:Infinity};\n}\nfunction statsData(range){\n  const w=rangeWindow(range), map={}, colorOf=new Map(db.subjects.map(s=>[s.id,s.color]));\n  let total=0;\n  db.sessions.forEach(s=>{\n    const d=parseDate(s.date).getTime();\n    if(d<w.from||d>w.to) return;\n    const k=s.subjectId;\n    if(!map[k]) map[k]={name:(db.subjects.find(x=>x.id===k)||{}).name||\"?\", color:colorOf.get(k)||\"#94A3B8\", minutes:0};\n    map[k].minutes+=s.durationMin; total+=s.durationMin;\n  });\n  return {slices:Object.values(map).sort((a,b)=>b.minutes-a.minutes), total};\n}\nfunction goalDone(g){ const from=parseDate(g.start).getTime(), to=parseDate(g.end).getTime(); let done=0; db.sessions.forEach(s=>{const d=parseDate(s.date).getTime(); if(d>=from&&d<=to)done+=s.durationMin;}); return done; }\nfunction goalCardHTML(){\n  const g=db.settings.goal; if(!g) return \"\";\n  const done=goalDone(g), goalMin=g.hours*60, pct=goalMin?Math.round(done/goalMin*100):0, achieved=done>=goalMin;\n  const today=parseDate(todayStr()).getTime(), DAY=86400000;\n  const from=parseDate(g.start).getTime(), to=parseDate(g.end).getTime();\n  let remainDays=0;\n  if(today<from) remainDays=Math.round((to-from)/DAY)+1;\n  else if(today<=to) remainDays=Math.round((to-today)/DAY)+1;\n  const remainMin=Math.max(0,goalMin-done);\n  let avg=null;\n  if(today>=from){ const elapsed=Math.round((Math.min(today,to)-from)/DAY)+1; if(elapsed>0)avg=Math.round(done/elapsed); }\n  let lines=[];\n  if(achieved){ lines.push('<b style=\"color:var(--s3)\">目標達成！<\u002Fb> この調子で積み上げよう。'); if(avg!=null)lines.push(\"1日平均: \"+formatMinutes(avg)); }\n  else if(remainDays>0){ const need=Math.ceil(remainMin/remainDays); lines.push(\"残り <b>\"+remainDays+\"日<\u002Fb> ・ 1日 <b>約\"+formatMinutes(need)+\"<\u002Fb> ペースで達成\"); if(avg!=null){ const j=avg>=need?'<span style=\"color:var(--s3)\">今のペースで届く<\u002Fspan>':'<span style=\"color:var(--danger)\">ペースアップが必要<\u002Fspan>'; lines.push(\"現在の1日平均 \"+formatMinutes(avg)+\" — \"+j); } }\n  else { lines.push(\"目標期間は終了しました。\"); if(avg!=null)lines.push(\"期間中の1日平均: \"+formatMinutes(avg)); }\n  return '<div class=\"card\"><div class=\"row\" style=\"justify-content:space-between;align-items:baseline\"><span style=\"font-weight:800;font-size:14px\">'+esc(g.label)+'の目標<\u002Fspan><button class=\"link\" data-act=\"editGoal\">変更<\u002Fbutton><\u002Fdiv>'+\n    '<div class=\"row\" style=\"align-items:baseline;gap:10px;margin-top:6px\"><span style=\"font-size:28px;font-weight:900;color:'+(achieved?\"var(--s3)\":\"var(--text)\")+'\">'+pct+'%<\u002Fspan><span class=\"muted\" style=\"font-size:13px;font-weight:700\">'+formatMinutes(done)+' / '+g.hours+'時間<\u002Fspan><\u002Fdiv>'+\n    '<div class=\"baltrack\" style=\"margin-top:8px\"><div class=\"balfill\" style=\"width:'+Math.min(100,pct)+'%;background:'+(achieved?\"var(--s3)\":\"var(--accent)\")+'\"><\u002Fdiv><\u002Fdiv>'+\n    '<p class=\"muted\" style=\"font-size:12px;line-height:1.6;margin:10px 0 0\">'+lines.join(\"<br>\")+'<\u002Fp><\u002Fdiv>';\n}\n\n/* ---------- エクスポート / インポート ---------- */\nfunction exportData(){\n  const json=JSON.stringify(db,null,2);\n  const blob=new Blob([json],{type:\"application/json\"});\n  const url=URL.createObjectURL(blob);\n  const a=document.createElement(\"a\");\n  a.href=url; a.download=`study-tracker-backup-${todayStr()}.json`;\n  document.body.appendChild(a); a.click(); a.remove();\n  setTimeout(()=>URL.revokeObjectURL(url),1000);\n}\nfunction importData(file){\n  const reader=new FileReader();\n  reader.onload=()=>{\n    try{\n      const p=JSON.parse(reader.result);\n      if(!p||typeof p!==\"object\") throw new Error(\"形式が違います\");\n      if(Array.isArray(p.entries) && (\"school\" in p || \"examDate\" in p)){\n        // 旧kobe形式\n        db=migrateFromKobe(p);\n      } else if(Array.isArray(p.subjects) && Array.isArray(p.sessions)){\n        // 新版系\n        db=normalizeV2(p); db.settings.onboarded=true;\n      } else {\n        throw new Error(\"このアプリのバックアップではないようです\");\n      }\n      saveDB(); setTheme(db.settings.theme||\"midnight\"); applyAccent();\n      view={name:\"home\"}; modal=null; statsRange=\"week\"; render();\n      toast(\"バックアップを読み込みました\");\n    }catch(e){ alert(\"インポートに失敗しました: \"+e.message); }\n  };\n  reader.onerror=()=>alert(\"ファイルの読み込みに失敗しました。\");\n  reader.readAsText(file);\n}\n\n/* ---------- アイコン(SVG) ---------- */\nconst ICONS={\n  home:'<path d=\"M3 10.6 12 3l9 7.6\"/><path d=\"M5 9.5V21h14V9.5\"/>',\n  grid:'<rect x=\"3.5\" y=\"3.5\" width=\"7\" height=\"7\" rx=\"1.6\"/><rect x=\"13.5\" y=\"3.5\" width=\"7\" height=\"7\" rx=\"1.6\"/><rect x=\"3.5\" y=\"13.5\" width=\"7\" height=\"7\" rx=\"1.6\"/><rect x=\"13.5\" y=\"13.5\" width=\"7\" height=\"7\" rx=\"1.6\"/>',\n  timer:'<circle cx=\"12\" cy=\"13.5\" r=\"7.5\"/><path d=\"M12 13.5V9.5\"/><path d=\"M9.5 2.5h5\"/>',\n  stats:'<path d=\"M4 20V11\"/><path d=\"M10 20V4\"/><path d=\"M16 20v-6\"/><path d=\"M21 20H3\"/>',\n  gear:'<circle cx=\"12\" cy=\"12\" r=\"3.2\"/><path d=\"M12 2.5v2.6M12 18.9v2.6M2.5 12h2.6M18.9 12h2.6M5.2 5.2l1.9 1.9M16.9 16.9l1.9 1.9M18.8 5.2l-1.9 1.9M7.1 16.9l-1.9 1.9\"/>',\n  chevronL:'<path d=\"M15 5l-7 7 7 7\"/>',\n  chevronR:'<path d=\"M9 5l7 7-7 7\"/>',\n  plus:'<path d=\"M12 5v14M5 12h14\"/>',\n  plusC:'<circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M12 8.2v7.6M8.2 12h7.6\"/>',\n  check:'<circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M8 12.2l2.6 2.6L16 9\"/>',\n  pencil:'<path d=\"M4 20h4L19 9l-4-4L4 16z\"/><path d=\"M14 6l4 4\"/>',\n  dots:'<circle cx=\"5\" cy=\"12\" r=\"1.6\"/><circle cx=\"12\" cy=\"12\" r=\"1.6\"/><circle cx=\"19\" cy=\"12\" r=\"1.6\"/>',\n  cal:'<rect x=\"3.5\" y=\"4.5\" width=\"17\" height=\"16\" rx=\"2.5\"/><path d=\"M3.5 9h17M8 2.5v4M16 2.5v4\"/>',\n  share:'<path d=\"M12 15V3\"/><path d=\"M8 7l4-4 4 4\"/><path d=\"M5 12v7a1 1 0 001 1h12a1 1 0 001-1v-7\"/>',\n  download:'<path d=\"M12 3v12\"/><path d=\"M8 11l4 4 4-4\"/><path d=\"M5 20h14\"/>',\n  x:'<path d=\"M6 6l12 12M18 6L6 18\"/>',\n  flame:'<path d=\"M12 2.5c1.5 3.5-1 5-1 7 0 1.4 1 2 2 2 1.5 0 2.5-1.4 2-3 2 1.2 3 3.2 3 5.2A6 6 0 116 15c0-3 3-4.5 3-8 1 .8 2 2 3 2.5.6-2.5-.5-5-.9-7z\"/>',\n};\nfunction icon(name,size){ size=size||22; return `<svg class=\"ic\" width=\"${size}\" height=\"${size}\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">${ICONS[name]||\"\"}<\u002Fsvg>`; }\nfunction star(filled){ return filled ? '<span style=\"font-size:22px;line-height:1;color:#F2A83B\">★<\u002Fspan>' : '<span style=\"font-size:22px;line-height:1;color:var(--subtext)\">☆<\u002Fspan>'; }\n\n/* ---------- ビジュアル部品 ---------- */\nfunction ring(size,stroke,progress,colorVar,inner){\n  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-clamp01(progress));\n  const col=colorVar.startsWith(\"--\")?`var(${colorVar})`:colorVar;\n  return `<div class=\"ring\" style=\"width:${size}px;height:${size}px\">\n    <svg width=\"${size}\" height=\"${size}\" style=\"transform:rotate(-90deg)\">\n      <circle cx=\"${size/2}\" cy=\"${size/2}\" r=\"${r}\" fill=\"none\" stroke=\"var(--cardAlt)\" stroke-width=\"${stroke}\"/>\n      <circle class=\"ringfg\" cx=\"${size/2}\" cy=\"${size/2}\" r=\"${r}\" fill=\"none\" stroke=\"${col}\" stroke-width=\"${stroke}\" stroke-linecap=\"round\" stroke-dasharray=\"${c.toFixed(1)}\" stroke-dashoffset=\"${off.toFixed(1)}\" style=\"transition:stroke-dashoffset .5s ease\"/>\n    <\u002Fsvg><div class=\"ring-in\">${inner||\"\"}<\u002Fdiv><\u002Fdiv>`;\n}\nfunction radar(data,size,color){\n  if(data.length<3) return \"\";\n  const cx=size/2, cy=size/2, R=size/2-36, n=data.length;\n  const ang=i=>Math.PI*2*i/n - Math.PI/2;\n  const pt=(i,r)=>[cx+Math.cos(ang(i))*r, cy+Math.sin(ang(i))*r];\n  let grid=\"\";\n  [0.25,0.5,0.75,1].forEach(f=>{ grid+=`<polygon points=\"${data.map((_,i)=>pt(i,R*f).map(v=>v.toFixed(1)).join(\",\")).join(\" \")}\" fill=\"none\" stroke=\"var(--faint)\" stroke-width=\"1\"/>`; });\n  let spokes=data.map((_,i)=>{const[x,y]=pt(i,R);return `<line x1=\"${cx}\" y1=\"${cy}\" x2=\"${x.toFixed(1)}\" y2=\"${y.toFixed(1)}\" stroke=\"var(--faint)\" stroke-width=\"1\"/>`;}).join(\"\");\n  const dpoly=data.map((d,i)=>pt(i,R*Math.max(0.02,clamp01(d.value))).map(v=>v.toFixed(1)).join(\",\")).join(\" \");\n  let labels=data.map((d,i)=>{const[x,y]=pt(i,R+15);const anchor=Math.abs(x-cx)<4?\"middle\":(x<cx?\"end\":\"start\");const lb=d.label.length>6?d.label.slice(0,6):d.label;return `<text x=\"${x.toFixed(1)}\" y=\"${y.toFixed(1)}\" font-size=\"10\" font-weight=\"700\" fill=\"var(--subtext)\" text-anchor=\"${anchor}\" dominant-baseline=\"middle\">${esc(lb)}<\u002Ftext>`;}).join(\"\");\n  return `<svg width=\"${size}\" height=\"${size}\">${grid}${spokes}<polygon points=\"${dpoly}\" fill=\"${alpha(color,0.22)}\" stroke=\"${color}\" stroke-width=\"2\"/>${labels}<\u002Fsvg>`;\n}\nfunction heatmap(mins){\n  const today=parseDate(todayStr()), dow=today.getDay();\n  const start=new Date(today); start.setDate(today.getDate()-dow-(HEAT_WEEKS-1)*7); // 左端=最も過去の週\n  let cols=\"\";\n  for(let w=0;w<HEAT_WEEKS;w++){            // w=0 左端(過去)、右へ行くほど最近。右端が今週\n    let cells=\"\";\n    for(let d=0;d<7;d++){\n      const dt=new Date(start); dt.setDate(start.getDate()+w*7+d);\n      const ds=toDateStr(dt), fut=dt>today, m=mins[ds]||0;\n      const lvl=fut?-1:m===0?0:m<30?1:m<60?2:m<120?3:4;\n      cells+=`<div class=\"heatcell\" data-l=\"${lvl}\" ${ds===todayStr()?'data-today=\"1\"':\"\"} title=\"${ds}: ${m}分\"><\u002Fdiv>`;\n    }\n    cols+=`<div class=\"heatcol\">${cells}<\u002Fdiv>`;\n  }\n  return `<div class=\"heatmap\">${cols}<\u002Fdiv>`;\n}\nfunction weeklyBars(days){\n  const max=Math.max(60,...days.map(d=>d.total));\n  return `<div class=\"wbars\">`+days.map(d=>{\n    const h=d.total===0?0:Math.max(6,d.total/max*110);\n    const segs=d.segments.map(s=>`<div style=\"height:${(s.minutes/Math.max(1,d.total)*h).toFixed(1)}px;background:${s.color}\"><\u002Fdiv>`).join(\"\");\n    return `<div class=\"wbcol\"><div class=\"wbtrack\"><div class=\"wbstack\" style=\"height:${h.toFixed(1)}px\">${segs}<\u002Fdiv><\u002Fdiv><div class=\"wblabel\" ${d.isToday?'data-today=\"1\"':\"\"}>${d.label}<\u002Fdiv><div class=\"wbmin\">${d.total||\"\"}<\u002Fdiv><\u002Fdiv>`;\n  }).join(\"\")+`<\u002Fdiv>`;\n}\n\n/* ============================================================\n   状態 / ルーター\n   ============================================================ */\nlet view = {name:\"home\"};\nlet modal = null;        // {type, ...}\nlet modalState = {};     // モーダル内の一時状態(色/アイコン/プリセット選択など)\nlet timer = null;        // {subjectId, topicId, mode, startedAt}\nlet timerInt = null;\nlet confettiOn = false;\nlet ob = null;           // オンボーディング状態\nlet animNav = true;      // 次のrenderで画面遷移アニメを再生するか(初回はtrue)\nlet navDir = \"fade\";     // push / pop / fade\nlet animOverlay = false; // モーダル/シートの登場アニメ\n\nconst TABS = [\"home\",\"subjects\",\"review\",\"record\",\"stats\"];\nconst isTab = n => TABS.includes(n);\n\nfunction go(v,dir){\n  if(!dir){ const detail=[\"subject\",\"topic\",\"settings\",\"exams\"].includes(v.name); dir=detail?\"push\":\"fade\"; }\n  navDir=dir; animNav=true; view=v; window.scrollTo(0,0); render();\n}\nfunction back(){\n  if(view.name===\"topic\"){ const t=db.topics.find(x=>x.id===view.id); go(t?{name:\"subject\",id:t.subjectId}:{name:\"subjects\"},\"pop\"); }\n  else if(view.name===\"subject\") go({name:\"subjects\"},\"pop\");\n  else if(view.name===\"exams\") go({name:\"settings\"},\"pop\");\n  else if(view.name===\"settings\") go({name:\"home\"},\"pop\");\n  else go({name:\"home\"},\"pop\");\n}\nfunction openModal(type,data){ modal=Object.assign({type},data||{}); initModalState(); animOverlay=true; render(); }\nfunction closeModal(){ modal=null; modalState={}; render(); }\nfunction initModalState(){\n  modalState={};\n  if(modal.type===\"subject\"){ const s=modal.editingId?db.subjects.find(x=>x.id===modal.editingId):null; modalState={name:s?s.name:\"\",color:s?s.color:COLOR_CHOICES[0],icon:s?s.icon:ICON_CHOICES[0]}; }\n  else if(modal.type===\"manual\"){ modalState={preset:25,custom:\"\",content:\"\",reviewOn:true,date:todayStr()}; }\n  else if(modal.type===\"save\"){ modalState={content:\"\",reviewOn:true}; }\n  else if(modal.type===\"topic\"){ modalState={name:\"\"}; }\n  else if(modal.type===\"rename\"){ const t=db.topics.find(x=>x.id===modal.topicId); modalState={name:t?t.name:\"\"}; }\n  else if(modal.type===\"memo\"){ const t=db.topics.find(x=>x.id===modal.topicId); modalState={memo:t&&t.memo?t.memo:\"\"}; }\n  else if(modal.type===\"exam\"){ const e=modal.editingId?db.exams.find(x=>x.id===modal.editingId):null; modalState={name:e?e.name:\"\",date:e?e.date:nextCommonTestDate()}; }\n  else if(modal.type===\"goal\"){ const g=db.settings.goal; modalState={label:g?g.label:\"夏期\",start:g?g.start:\"2026-07-01\",end:g?g.end:\"2026-08-31\",hours:g?String(g.hours):\"\"}; }\n  else if(modal.type===\"school\"){ modalState={school:db.settings.school||\"\"}; }\n}\n\n/* ============================================================\n   画面レンダリング\n   ============================================================ */\nfunction render(){\n  const app=document.getElementById(\"app\");\n  document.documentElement.setAttribute(\"data-theme\", db.settings.theme||\"midnight\");\n  applyAccent();\n  if(!db.settings.onboarded){ if(!ob)ob={step:0,school:\"\",examName:\"共通テスト\",examDate:nextCommonTestDate(),selected:new Set()}; app.innerHTML=onboardingHTML(); flushToast(); return; }\n\n  let inner, tb=\"\";\n  if(isTab(view.name)){\n    inner = ({home:homeHTML,subjects:subjectsHTML,review:reviewHTML,record:recordHTML,stats:statsHTML}[view.name])();\n    tb = tabbarHTML(view.name);\n  } else {\n    inner = ({subject:subjectHTML,topic:topicHTML,settings:settingsHTML,exams:examsHTML}[view.name])();\n  }\n  let html = `<div class=\"view-wrap${animNav?\" view-enter view-enter-\"+navDir:\"\"}\">${inner}<\u002Fdiv>` + tb;\n  if(modal) html += modalHTML();\n  if(confettiOn) html += confettiHTML();\n  app.innerHTML = html;\n  animNav=false;\n\n  // モーダル/シートの登場アニメ(初回表示時のみ)\n  if(modal && animOverlay){\n    const dlg=app.querySelector(\".dialog\"); if(dlg) dlg.classList.add(\"dialog-enter\");\n    const sh=app.querySelector(\".sheet\"); if(sh) sh.classList.add(\"sheet-enter\");\n    app.querySelectorAll(\".backdrop,.sheetbg\").forEach(el=>el.classList.add(\"fade-enter\"));\n  }\n  animOverlay=false;\n\n  // タイマー稼働中は表示を即同期\n  if(timer && view.name===\"record\") updateTimerDisplay();\n  flushToast();\n}\nfunction flushToast(){ if(pendingToast){ const m=pendingToast; pendingToast=null; setTimeout(()=>toast(m),60); } }\n\nfunction tabbarHTML(active){\n  const dc=dueCount();\n  const tabs=[[\"home\",\"home\",\"ホーム\",0],[\"subjects\",\"grid\",\"科目\",0],[\"review\",\"check\",\"復習\",dc],[\"record\",\"timer\",\"記録\",0],[\"stats\",\"stats\",\"統計\",0]];\n  return `<nav class=\"tabbar\">`+tabs.map(([k,ic,label,badge])=>`<button class=\"tab ${active===k?\"on\":\"\"}\" data-act=\"tab:${k}\"><span class=\"tabicwrap\">${icon(ic,23)}${badge>0?`<span class=\"badge\">${badge>9?\"9+\":badge}<\u002Fspan>`:\"\"}<\u002Fspan><span>${label}<\u002Fspan><\u002Fbutton>`).join(\"\")+`<\u002Fnav>`;\n}\nfunction backHeader(title){ return `<div class=\"backhd\"><button class=\"iconbtn\" data-act=\"back\">${icon(\"chevronL\",22)}<\u002Fbutton><span class=\"title\">${esc(title)}<\u002Fspan><\u002Fdiv>`; }\n\n/* ---------- ホーム ---------- */\nfunction homeHTML(){\n  const subs=activeSubjects(), streak=computeStreak(), mins=minutesByDate();\n  const ex=primaryExam();\n  let cd;\n  if(ex){\n    const d=daysUntil(ex.date);\n    const others=otherExams(ex.id).slice(0,4);\n    cd=`<div class=\"card\">\n      ${db.settings.school?`<div class=\"muted\" style=\"font-size:12px;font-weight:800;margin-bottom:2px\">🎯 ${esc(db.settings.school)}<\u002Fdiv>`:\"\"}\n      <div class=\"row\" style=\"justify-content:space-between\"><span class=\"muted\" style=\"font-size:13px;font-weight:700\">${esc(ex.name)}<\u002Fspan>${star(true)}<\u002Fdiv>\n      <div class=\"row\" style=\"align-items:flex-end;margin-top:2px\">\n        <span style=\"font-size:64px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;color:${d<=7&&d>=0?\"var(--flame)\":\"var(--text)\"}\">${d>=0?d:\"—\"}<\u002Fspan>\n        <span class=\"muted\" style=\"font-size:15px;font-weight:700;margin:0 0 12px 8px\">${d>0?\"日後\":d===0?\"今日が本番!\":\"終了\"}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"muted\" style=\"font-size:12px;margin-top:4px\">${esc(formatDateJP(ex.date))}<\u002Fdiv>\n      ${others.length?`<div class=\"chips\" style=\"margin-top:12px\">${others.map(o=>`<span class=\"chip\">${esc(o.name)} あと${daysUntil(o.date)}日<\u002Fspan>`).join(\"\")}<\u002Fdiv>`:\"\"}\n    <\u002Fdiv>`;\n  } else {\n    cd=`<div class=\"card press\" data-act=\"nav:exams\"><div class=\"row\"><div class=\"bubble\" style=\"background:${alpha(\"#8AA2FF\",0.16)}\">${icon(\"cal\",18)}<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px\"><div style=\"font-weight:800;font-size:15px\">試験日を設定しよう<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">本番まで何日か表示されます<\u002Fdiv><\u002Fdiv>${icon(\"chevronR\",18)}<\u002Fdiv><\u002Fdiv>`;\n  }\n\n  const rev=dueItems();\n  let revCard=\"\";\n  if(rev.due.length){\n    revCard=`<div class=\"card press\" data-act=\"tab:review\" style=\"background:${tint(\"var(--danger)\",12)}\"><div class=\"row\"><div class=\"bubble\" style=\"background:${tint(\"var(--danger)\",20)};color:var(--danger)\">⏰<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px\"><div style=\"font-weight:800;font-size:15px;color:var(--danger)\">復習が ${rev.due.length}件 たまっています<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">タップして復習する<\u002Fdiv><\u002Fdiv>${icon(\"chevronR\",18)}<\u002Fdiv><\u002Fdiv>`;\n  } else if(rev.up.length){\n    const n=rev.up[0];\n    revCard=`<div class=\"card\"><div class=\"row\"><div class=\"bubble\" style=\"background:${tint(\"var(--accent)\",14)}\">🗓️<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px;min-width:0\"><div style=\"font-weight:800;font-size:14px\">次の復習: ${fmtMD2(shiftDate(n.s.date,n.st.days))}<\u002Fdiv><div class=\"clip muted\" style=\"font-size:12px;margin-top:2px\">${esc(subjectNameOf(n.s.subjectId))} ・ ${esc(reviewTitle(n.s))}<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n  }\n\n  const streakCard=`<div class=\"card\"><div class=\"row\"><div class=\"bubble\" style=\"background:${alpha(\"#FFB454\",0.16)};color:var(--flame)\">${icon(\"flame\",20)}<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px\">\n    <div style=\"font-size:20px;font-weight:900\">${streak.current}日 連続<\u002Fdiv>\n    <div class=\"muted\" style=\"font-size:12px;margin-top:1px\">${streak.studiedToday?\"今日も記録済み!この調子で✨\":streak.current>0?\"今日まだ未記録。続けよう🔥\":\"今日から始めよう\"}<\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n\n  const heatCard=`<div class=\"card\"><div class=\"row\" style=\"justify-content:space-between;margin-bottom:12px\"><span style=\"font-weight:800;font-size:14px\">学習の記録<\u002Fspan><span class=\"muted\" style=\"font-size:11px\">最近${HEAT_WEEKS}週<\u002Fspan><\u002Fdiv>${heatmap(mins)}<\u002Fdiv>`;\n\n  let subsBlock;\n  if(subs.length===0){\n    subsBlock=`<div class=\"empty\"><div style=\"font-weight:800;font-size:15px\">科目を追加しよう<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:6px\">科目タブから登録できます<\u002Fdiv><\u002Fdiv>`;\n  } else {\n    subsBlock=`<div style=\"display:flex;gap:12px;overflow-x:auto;padding:2px 2px 4px;margin:0 -2px\">`+subs.map(s=>{const st=subjectStats(s);return `<button data-act=\"nav:subject:${s.id}\" style=\"flex:none;background:var(--card);border-radius:18px;padding:14px;width:118px;box-shadow:0 1px 3px var(--shadow)\">\n      <div style=\"display:flex;justify-content:center\">${ring(64,7,st.progress,s.color,`<span style=\"font-weight:800;font-size:13px;color:var(--text)\">${Math.round(st.progress*100)}%<\u002Fspan>`)}<\u002Fdiv>\n      <div class=\"clip\" style=\"font-weight:800;font-size:13px;margin-top:10px;text-align:center\">${esc(s.icon)} ${esc(s.name)}<\u002Fdiv>\n    <\u002Fbutton>`;}).join(\"\")+`<\u002Fdiv>`;\n  }\n\n  return `<div class=\"screen safe-top\">\n    <div class=\"hd\"><h1>${greeting()}<\u002Fh1><button class=\"iconbtn\" data-act=\"nav:settings\">${icon(\"gear\",21)}<\u002Fbutton><\u002Fdiv>\n    ${cd}${revCard}${streakCard}${heatCard}\n    <div class=\"sect\">科目の進捗<\u002Fdiv>${subsBlock}\n  <\u002Fdiv>`;\n}\nfunction greeting(){ const h=new Date().getHours(); return h<5?\"おつかれさま\":h<11?\"おはよう\":h<18?\"こんにちは\":\"今日もおつかれ\"; }\n\n/* ---------- 科目一覧 ---------- */\nfunction subjectsHTML(){\n  const subs=activeSubjects();\n  let body;\n  if(subs.length===0){\n    body=`<div class=\"empty\"><div style=\"font-weight:800;font-size:16px\">最初の科目を追加しよう<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin:6px 0 16px\">科目を作って分野を登録すると<br>進捗が見える化されます<\u002Fdiv><button class=\"btn\" data-act=\"addSubject\">科目を追加<\u002Fbutton><\u002Fdiv>`;\n  } else {\n    body=`<div class=\"grid\">`+subs.map(s=>{const st=subjectStats(s);const done=st.topicCount>0&&st.perfectCount===st.topicCount;return `<button class=\"cell press\" data-act=\"nav:subject:${s.id}\" data-long=\"subjMenu:${s.id}\">\n      <div class=\"row\" style=\"justify-content:space-between\"><div class=\"bubble\" style=\"background:${alpha(s.color,0.16)}\">${esc(s.icon)}<\u002Fdiv>${done?'<span style=\"font-size:18px\">🏆<\u002Fspan>':\"\"}<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-top:10px\">${ring(62,7,st.progress,s.color,`<span style=\"font-weight:800;font-size:13px;color:var(--text)\">${Math.round(st.progress*100)}%<\u002Fspan>`)}<\u002Fdiv>\n      <div class=\"clip\" style=\"font-weight:800;font-size:14px;margin-top:10px;text-align:center\">${esc(s.name)}<\u002Fdiv>\n      <div class=\"muted center\" style=\"font-size:11px;margin-top:2px\">完璧 ${st.perfectCount}/${st.topicCount}<\u002Fdiv>\n    <\u002Fbutton>`;}).join(\"\")+`<\u002Fdiv><div class=\"muted center\" style=\"font-size:11px;margin-top:16px\">カードを長押しで編集・削除<\u002Fdiv>`;\n  }\n  const archived=db.subjects.filter(s=>s.archived).sort((a,b)=>a.order-b.order);\n  if(archived.length){\n    body+=`<div class=\"sect\">アーカイブ済み（${archived.length}）<\u002Fdiv>`+archived.map(s=>`<div class=\"trow\" style=\"margin-bottom:8px\"><div class=\"bubble\" style=\"background:${alpha(s.color,0.16)};flex:none\">${esc(s.icon)}<\u002Fdiv><span class=\"clip grow\" style=\"font-size:14px;font-weight:700;margin-left:12px\">${esc(s.name)}<\u002Fspan><button class=\"undobtn\" data-act=\"unarchiveSubject:${s.id}\">戻す<\u002Fbutton><\u002Fdiv>`).join(\"\")+`<div class=\"muted center\" style=\"font-size:11px;margin-top:6px\">アーカイブは進捗・記録を残したまま一覧から隠す機能です<\u002Fdiv>`;\n  }\n  return `<div class=\"screen safe-top\"><div class=\"hd\"><h1>科目<\u002Fh1><button class=\"iconbtn accent\" data-act=\"addSubject\">${icon(\"plus\",24)}<\u002Fbutton><\u002Fdiv>${body}<\u002Fdiv>`;\n}\n\n/* ---------- 科目詳細 ---------- */\nfunction subjectHTML(){\n  const s=db.subjects.find(x=>x.id===view.id);\n  if(!s){ back(); return \"\"; }\n  const ts=topicsOf(s.id), st=subjectStats(s), color=s.color;\n  const dist=[0,1,2,3].map(k=>ts.filter(t=>t.stage===k).length);\n  const done=ts.length>0&&st.perfectCount===ts.length;\n\n  const overview=`<div class=\"card\"><div class=\"row\">\n    ${ring(88,9,st.progress,color,`<span style=\"font-weight:900;font-size:18px;color:var(--text)\">${Math.round(st.progress*100)}%<\u002Fspan>`)}\n    <div class=\"grow\" style=\"margin-left:16px\">\n      <div style=\"font-size:16px;font-weight:900\">完璧 ${st.perfectCount}/${ts.length} 分野<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:8px\">${dist.map((c,k)=>`<span class=\"distpill\" style=\"background:${alpha(getVar(STAGE_VARS[k]),0.14)}\"><span class=\"dot\" style=\"background:var(${STAGE_VARS[k]})\"><\u002Fspan><span style=\"color:var(${STAGE_VARS[k]});font-size:11px;font-weight:800\">${c}<\u002Fspan><\u002Fspan>`).join(\"\")}<\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n    ${done?'<div class=\"row center\" style=\"justify-content:center;gap:6px;margin-top:12px\"><span style=\"font-size:16px\">🏆<\u002Fspan><span style=\"color:#F2A83B;font-weight:800;font-size:13px\">全分野マスター!<\u002Fspan><\u002Fdiv>':\"\"}\n  <\u002Fdiv>`;\n\n  const radarCard=(ts.length>=3&&ts.length<=8)?`<div class=\"card center\">${radar(ts.map(t=>({label:t.name,value:t.stage/3})),280,color)}<\u002Fdiv>`:\"\";\n\n  let list;\n  if(ts.length===0){\n    list=`<div class=\"empty\"><div style=\"font-weight:800;font-size:15px\">分野を追加しよう<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin:4px 0 14px\">例: 三角関数、長文読解、力学 …<\u002Fdiv><button class=\"btn\" data-act=\"addTopic:${s.id}\">分野を追加<\u002Fbutton><\u002Fdiv>`;\n  } else {\n    list=ts.map(t=>{const tm=topicMinutes(t.id);return `<div class=\"trow press\" data-act=\"stage:${t.id}\" style=\"margin-bottom:8px\">\n      <div class=\"sbar\" style=\"background:var(${STAGE_VARS[t.stage]})\"><\u002Fdiv>\n      <div class=\"grow\" style=\"margin-left:12px\">\n        <div class=\"clip\" style=\"font-size:15px;font-weight:700\">${esc(t.name)}<\u002Fdiv>\n        <div class=\"clip muted\" style=\"font-size:11px;margin-top:3px\">${tm>0?\"⏱ \"+formatMinutes(tm):\"⏱ 記録なし\"}${t.memo?\" ・ 📝 \"+esc(t.memo):\"\"}<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"pill\" style=\"background:${alpha(getVar(STAGE_VARS[t.stage]),0.15)};color:var(${STAGE_VARS[t.stage]})\">${STAGE_LABELS[t.stage]}<\u002Fspan>\n      <button class=\"iconbtn\" data-act=\"nav:topic:${t.id}\" style=\"width:32px;height:32px;background:transparent;margin-left:6px;color:var(--subtext)\">${icon(\"dots\",18)}<\u002Fbutton>\n    <\u002Fdiv>`;}).join(\"\")+`<div class=\"muted center\" style=\"font-size:11px;margin-top:6px\">タップでステージ変更 / 「…」で詳細・メモ<\u002Fdiv>`;\n  }\n\n  return `${backHeader(s.icon+\" \"+s.name)}<div class=\"screen\">\n    <div class=\"row\" style=\"justify-content:flex-end;margin-bottom:10px\"><button class=\"btn\" style=\"width:auto;padding:9px 14px;font-size:14px\" data-act=\"addTopic:${s.id}\">${icon(\"plus\",18)}分野を追加<\u002Fbutton><\u002Fdiv>\n    ${overview}${radarCard}\n    <div class=\"sect\">分野(${ts.length})<\u002Fdiv>${list}\n  <\u002Fdiv>`;\n}\nfunction getVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||\"#888\"; }\n\n/* ---------- 分野詳細 ---------- */\nfunction topicHTML(){\n  const t=db.topics.find(x=>x.id===view.id);\n  if(!t){ back(); return \"\"; }\n  const s=db.subjects.find(x=>x.id===t.subjectId), color=s?s.color:\"var(--accent)\";\n  const stageBtns=STAGE_LABELS.map((lb,i)=>{const on=t.stage===i;return `<button class=\"sheetrow press\" data-act=\"setStage:${t.id}:${i}\" style=\"width:100%;background:${on?alpha(getVar(STAGE_VARS[i]),0.14):\"transparent\"}\">\n    <span class=\"dot\" style=\"width:13px;height:13px;background:var(${STAGE_VARS[i]})\"><\u002Fspan>\n    <div class=\"grow\"><div style=\"font-size:15px;font-weight:700\">${lb}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px;margin-top:1px\">${STAGE_DESCS[i]}<\u002Fdiv><\u002Fdiv>\n    ${on?`<span style=\"color:var(${STAGE_VARS[i]})\">${icon(\"check\",20)}<\u002Fspan>`:\"\"}\n  <\u002Fbutton>`;}).join(\"\");\n\n  return `${backHeader(\"分野の詳細\")}<div class=\"screen\">\n    <div class=\"card\"><div class=\"row\"><div class=\"grow\"><div class=\"muted\" style=\"font-size:11px;font-weight:700\">${esc(s?s.name:\"\")}<\u002Fdiv><div style=\"font-size:21px;font-weight:900;margin-top:2px\">${esc(t.name)}<\u002Fdiv><\u002Fdiv><button class=\"iconbtn\" style=\"background:transparent;color:var(--subtext)\" data-act=\"rename:${t.id}\">${icon(\"pencil\",19)}<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"sect\">ステージ<\u002Fdiv><div class=\"card\" style=\"padding:8px\">${stageBtns}<\u002Fdiv>\n    <div class=\"sect\">メモ<\u002Fdiv><div class=\"card press\" data-act=\"memo:${t.id}\">${t.memo?`<div style=\"font-size:14px;line-height:1.5\">${esc(t.memo)}<\u002Fdiv>`:'<div class=\"muted\" style=\"font-size:13px\">タップしてメモを追加(苦手ポイント、参考書など)<\u002Fdiv>'}<\u002Fdiv>\n    <div class=\"sect\">情報<\u002Fdiv><div class=\"card\" style=\"display:flex;flex-direction:column;gap:10px\">\n      ${infoRow(\"合計学習時間\",formatMinutes(topicMinutes(t.id)))}${infoRow(\"最終学習\",fmtIso(t.lastStudiedAt))}${infoRow(\"ステージ更新\",fmtIso(t.stageUpdatedAt))}${infoRow(\"登録日\",fmtIso(t.createdAt))}\n    <\u002Fdiv>\n    <div class=\"center\" style=\"margin-top:16px\"><button data-act=\"deleteTopic:${t.id}\" style=\"color:var(--danger);font-weight:800;font-size:14px;padding:8px\">この分野を削除<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction infoRow(l,v){ return `<div class=\"row\" style=\"justify-content:space-between\"><span class=\"muted\" style=\"font-size:13px;font-weight:700\">${l}<\u002Fspan><span style=\"font-size:13px;font-weight:700\">${esc(v)}<\u002Fspan><\u002Fdiv>`; }\n\n/* ---------- 記録 ---------- */\nfunction reviewHTML(){\n  const r=dueItems();\n  let body=`<div class=\"sect\" style=\"margin-top:8px\">期限が来た復習${r.due.length?\"（\"+r.due.length+\"）\":\"\"}<\u002Fdiv>`;\n  if(!r.due.length){\n    body+=`<div class=\"empty\"><div style=\"font-weight:800;font-size:15px\">今日の復習はありません 🎉<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:6px\">記録するときに「復習リストに入れる」をONにすると、1日後・1週間後・1ヶ月後にここへ出ます。<\u002Fdiv><\u002Fdiv>`;\n  } else {\n    body+=r.due.map(d=>{\n      const col=subjectColor(d.s.subjectId);\n      const over=Math.round((parseDate(todayStr())-d.dd)/86400000);\n      return `<div class=\"trow\" style=\"margin-bottom:8px;align-items:stretch\">\n        <div class=\"sbar\" style=\"background:${col}\"><\u002Fdiv>\n        <div class=\"grow\" style=\"margin-left:12px;min-width:0\">\n          <div class=\"row\" style=\"gap:6px;flex-wrap:wrap\"><span class=\"pill\" style=\"background:${tint(col,18)};color:${col}\">${esc(subjectNameOf(d.s.subjectId))}<\u002Fspan><span class=\"pill\" style=\"background:var(--cardAlt);color:var(--subtext)\">${d.st.label}の復習<\u002Fspan>${d.over?`<span class=\"pill\" style=\"background:${tint(\"var(--danger)\",15)};color:var(--danger)\">${over}日超過<\u002Fspan>`:\"\"}<\u002Fdiv>\n          <div class=\"clip\" style=\"font-size:14px;font-weight:700;margin-top:5px\">${esc(reviewTitle(d.s))}<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px;margin-top:2px\">学習日 ${fmtMD2(d.s.date)}<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"donebtn\" data-act=\"markDone:${d.s.id}:${d.st.key}\">完了<\u002Fbutton>\n      <\u002Fdiv>`;\n    }).join(\"\");\n  }\n  if(r.up.length){\n    body+=`<div class=\"sect\">今後7日の予定<\u002Fdiv>`;\n    body+=r.up.map(d=>{\n      const col=subjectColor(d.s.subjectId);\n      return `<div class=\"trow\" style=\"margin-bottom:8px\"><span class=\"dot\" style=\"width:9px;height:9px;background:${col};flex:none\"><\u002Fspan><span class=\"muted\" style=\"font-size:12px;font-weight:800;margin-left:10px;flex:none\">${fmtMD2(shiftDate(d.s.date,d.st.days))}<\u002Fspan><span class=\"pill\" style=\"margin-left:8px;background:var(--cardAlt);color:var(--subtext);flex:none\">${d.st.label.replace(\"後\",\"\")}<\u002Fspan><span class=\"clip grow\" style=\"font-size:13px;margin-left:10px\"><b style=\"color:${col}\">${esc(subjectNameOf(d.s.subjectId))}<\u002Fb> ・ ${esc(reviewTitle(d.s))}<\u002Fspan><\u002Fdiv>`;\n    }).join(\"\");\n  }\n  const done=completedReviews();\n  if(done.length){\n    const show=done.slice(0,20);\n    body+=`<div class=\"sect\">完了した復習（${done.length}）<\u002Fdiv>`;\n    body+=show.map(d=>{\n      const col=subjectColor(d.s.subjectId);\n      return `<div class=\"trow\" style=\"margin-bottom:8px\">\n        <div class=\"sbar\" style=\"background:${col}\"><\u002Fdiv>\n        <div class=\"grow\" style=\"margin-left:12px;min-width:0\">\n          <div class=\"row\" style=\"gap:6px;flex-wrap:wrap\"><span class=\"pill\" style=\"background:${tint(col,18)};color:${col}\">${esc(subjectNameOf(d.s.subjectId))}<\u002Fspan><span class=\"pill\" style=\"background:${tint(\"var(--s3)\",15)};color:var(--s3)\">✓ ${d.st.label}<\u002Fspan><\u002Fdiv>\n          <div class=\"clip\" style=\"font-size:14px;font-weight:700;margin-top:5px\">${esc(reviewTitle(d.s))}<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px;margin-top:2px\">予定日 ${fmtMD2(shiftDate(d.s.date,d.st.days))}<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"undobtn\" data-act=\"undoReview:${d.s.id}:${d.st.key}\">戻す<\u002Fbutton>\n      <\u002Fdiv>`;\n    }).join(\"\");\n    if(done.length>20) body+=`<div class=\"muted center\" style=\"font-size:11px;margin-top:6px\">ほか ${done.length-20}件<\u002Fdiv>`;\n  }\n  return `<div class=\"screen safe-top\"><div class=\"hd\"><h1>復習<\u002Fh1><\u002Fdiv>${body}<\u002Fdiv>`;\n}\nfunction recordHTML(){\n  const subs=activeSubjects();\n  if(timer){\n    const s=db.subjects.find(x=>x.id===timer.subjectId);\n    const tp=timer.topicId?db.topics.find(x=>x.id===timer.topicId):null;\n    return `<div class=\"screen safe-top\"><div class=\"runwrap\">\n      <div class=\"muted\" style=\"font-size:13px;font-weight:700\">${timer.mode===\"countdown\"?Math.round(timer.durationSec/60)+\"分 タイマー\":\"ストップウォッチ\"}${timer.running?\"\":\" ・ 一時停止中\"}<\u002Fdiv>\n      <div class=\"clip\" style=\"font-size:20px;font-weight:900;margin-top:6px;max-width:90%\">${esc(s?s.name:\"\")}${tp?\" / \"+esc(tp.name):\"\"}<\u002Fdiv>\n      <div style=\"margin:34px 0\">${ring(240,15,0,s?s.color:\"--accent\",`<span class=\"tnum\" id=\"tNum\">--:--<\u002Fspan><span class=\"muted\" id=\"tLbl\" style=\"font-size:12px;font-weight:700;margin-top:4px\"><\u002Fspan>`)}<\u002Fdiv>\n      <div class=\"row\" style=\"gap:12px;width:100%;max-width:360px\">\n        <button class=\"btn\" style=\"flex:1;background:${timer.running?\"var(--cardAlt)\":\"var(--accent)\"};color:${timer.running?\"var(--text)\":\"#fff\"}\" data-act=\"${timer.running?\"pauseTimer\":\"resumeTimer\"}\">${timer.running?\"⏸ 一時停止\":\"▶ 再開\"}<\u002Fbutton>\n        <button class=\"btn\" style=\"flex:1;background:var(--s3)\" data-act=\"finishTimer\">終了して記録<\u002Fbutton>\n      <\u002Fdiv>\n      <button data-act=\"discardTimer\" style=\"color:var(--subtext);font-weight:700;font-size:14px;margin-top:18px;padding:8px\">破棄する<\u002Fbutton>\n    <\u002Fdiv><\u002Fdiv>`;\n  }\n\n  let body;\n  if(subs.length===0){\n    body=`<div class=\"card press center\" data-act=\"tab:subjects\"><div style=\"font-weight:800;font-size:15px\">まず科目を追加しよう<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:4px\">タップして科目タブへ<\u002Fdiv><\u002Fdiv>`;\n  } else {\n    const sid=modalState.recSubject!=null?modalState.recSubject:(subs[0]?subs[0].id:null);\n    // recSubject/recTopic/recMode を timer外の一時状態として保持\n    if(recState.subject==null || !subs.some(s=>s.id===recState.subject)) recState.subject=subs[0].id;\n    const cur=db.subjects.find(s=>s.id===recState.subject);\n    const ts=topicsOf(recState.subject);\n    if(recState.topic!=null && !ts.some(t=>t.id===recState.topic)) recState.topic=null;\n\n    body=`\n      <div class=\"sect\" style=\"margin-top:0\">科目<\u002Fdiv><div class=\"chips\">${subs.map(s=>`<button class=\"chip ${recState.subject===s.id?\"on\":\"\"}\" style=\"${recState.subject===s.id?`background:${s.color}`:\"\"}\" data-act=\"recSub:${s.id}\">${esc(s.name)}<\u002Fbutton>`).join(\"\")}<\u002Fdiv>\n      ${ts.length?`<div class=\"sect\">分野(任意)<\u002Fdiv><div class=\"chips\"><button class=\"chip ${recState.topic==null?\"on\":\"\"}\" style=\"${recState.topic==null?\"background:var(--accent)\":\"\"}\" data-act=\"recTop:0\">指定しない<\u002Fbutton>${ts.map(t=>`<button class=\"chip ${recState.topic===t.id?\"on\":\"\"}\" style=\"${recState.topic===t.id?`background:${cur.color}`:\"\"}\" data-act=\"recTop:${t.id}\">${esc(t.name)}<\u002Fbutton>`).join(\"\")}<\u002Fdiv>`:\"\"}\n      <div class=\"sect\">タイマー<\u002Fdiv><div class=\"chips\">\n        <button class=\"chip ${recState.mode===\"countdown\"?\"on\":\"\"}\" style=\"${recState.mode===\"countdown\"?\"background:var(--accent);color:#fff\":\"\"}\" data-act=\"recMode:countdown\">カウントダウン<\u002Fbutton>\n        <button class=\"chip ${recState.mode===\"stopwatch\"?\"on\":\"\"}\" style=\"${recState.mode===\"stopwatch\"?\"background:var(--accent);color:#fff\":\"\"}\" data-act=\"recMode:stopwatch\">ストップウォッチ<\u002Fbutton>\n      <\u002Fdiv>\n      ${recState.mode===\"countdown\"?`<div class=\"chips\" style=\"margin-top:2px\">${[15,25,30,45,60,90].map(m=>`<button class=\"chip ${recState.timerMin===m?\"on\":\"\"}\" style=\"${recState.timerMin===m?\"background:var(--accent);color:#fff\":\"\"}\" data-act=\"recMin:${m}\">${m}分<\u002Fbutton>`).join(\"\")}<\u002Fdiv>\n      <div class=\"row\" style=\"gap:8px;margin-top:4px\"><input class=\"field\" id=\"timerMinInput\" value=\"${esc(String(recState.timerMin))}\" inputmode=\"numeric\" placeholder=\"自分で設定(分)\" style=\"flex:1\"><span class=\"muted\" style=\"font-size:13px;font-weight:700\">分<\u002Fspan><\u002Fdiv>`:\"\"}\n      <button class=\"btn\" style=\"margin-top:12px;background:${cur?cur.color:\"var(--accent)\"}\" data-act=\"startTimer\">スタート${recState.mode===\"countdown\"?`（${recState.timerMin}分）`:\"\"}<\u002Fbutton>\n      <button class=\"btn ghost\" style=\"margin-top:10px\" data-act=\"manual\">${icon(\"pencil\",16)}あとから手動で記録<\u002Fbutton>\n      <div class=\"muted center\" style=\"font-size:11px;margin-top:14px\">タイマーはこの画面を開いている間だけ動きます<\u002Fdiv>`;\n  }\n  const recent=recentSessions(15);\n  let hist=\"\";\n  if(recent.length){\n    hist=`<div class=\"sect\">最近の記録<\u002Fdiv>`+recent.map(s=>{\n      const sub=db.subjects.find(x=>x.id===s.subjectId), col=sub?sub.color:\"var(--accent)\";\n      return `<div class=\"trow\" style=\"margin-bottom:8px\">\n        <div class=\"sbar\" style=\"background:${col}\"><\u002Fdiv>\n        <div class=\"grow\" style=\"margin-left:12px;min-width:0\">\n          <div class=\"clip\" style=\"font-size:14px;font-weight:700\">${esc(sessionLabel(s))}<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:11px;margin-top:2px\">${esc(subjectNameOf(s.subjectId))} ・ ${fmtMD2(s.date)} ・ ${formatMinutes(s.durationMin)}${s.reviews?\" ・ 復習ON\":\"\"}<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"iconbtn\" data-act=\"delSession:${s.id}\" style=\"width:36px;height:36px;background:transparent;color:var(--danger);font-size:17px\">🗑<\u002Fbutton>\n      <\u002Fdiv>`;\n    }).join(\"\")+`<div class=\"muted center\" style=\"font-size:11px;margin-top:6px\">誤って記録した学習はここで削除できます<\u002Fdiv>`;\n  }\n  return `<div class=\"screen safe-top\"><div class=\"hd\"><h1>記録<\u002Fh1><\u002Fdiv>${body}${hist}<\u002Fdiv>`;\n}\nlet recState={subject:null,topic:null,mode:\"countdown\",timerMin:25};\n\n/* ---------- 統計 ---------- */\nfunction statsHTML(){\n  const subs=activeSubjects(), tot=totals(), streak=computeStreak();\n  const colorOf=new Map(db.subjects.map(s=>[s.id,s.color]));\n  const range=statsRange;\n  const sd=statsData(range);\n  const dates=lastNDateStrs(7);\n  const days=dates.map(date=>{\n    const rows=db.sessions.filter(s=>s.date===date);\n    const bySub={};\n    rows.forEach(r=>{bySub[r.subjectId]=(bySub[r.subjectId]||0)+r.durationMin;});\n    return {date,label:WEEKDAY_JP[weekdayOf(date)],isToday:date===todayStr(),total:rows.reduce((a,r)=>a+r.durationMin,0),segments:Object.keys(bySub).map(k=>({color:colorOf.get(Number(k))||\"var(--faint)\",minutes:bySub[k]}))};\n  });\n  const tile=(l,v)=>`<div style=\"flex:1;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px var(--shadow);padding:14px;display:flex;flex-direction:column;justify-content:center;min-height:80px\"><div class=\"muted\" style=\"font-size:11px;font-weight:700\">${l}<\u002Fdiv><div style=\"font-size:17px;font-weight:900;margin-top:4px\">${v}<\u002Fdiv><\u002Fdiv>`;\n\n  const chipDefs=[[\"week\",\"週間\"],[\"month\",\"月間\"]];\n  if(db.settings.goal) chipDefs.push([\"goal\",db.settings.goal.label]);\n  chipDefs.push([\"all\",\"全期間\"]);\n  const chipHTML=`<div class=\"chips\">${chipDefs.map(([k,l])=>`<button class=\"chip ${range===k?\"on\":\"\"}\" style=\"${range===k?\"background:var(--accent);color:#fff\":\"\"}\" data-act=\"statsRange:${k}\">${esc(l)}<\u002Fbutton>`).join(\"\")}<\u002Fdiv>`;\n\n  let donutCard;\n  if(!sd.slices.length){ donutCard=`<div class=\"card\"><div class=\"muted center\" style=\"font-size:13px\">この期間の記録はまだありません<\u002Fdiv><\u002Fdiv>`; }\n  else {\n    const legend=sd.slices.map(x=>{const pct=Math.round(x.minutes/sd.total*100);return `<div class=\"leg\"><span class=\"dot\" style=\"width:10px;height:10px;background:${x.color}\"><\u002Fspan><span class=\"lname clip\">${esc(x.name)}<\u002Fspan><span class=\"lbar\"><span class=\"lfill\" style=\"width:${pct}%;background:${x.color}\"><\u002Fspan><\u002Fspan><span class=\"muted\" style=\"font-size:12px;font-weight:700\">${formatMinutes(x.minutes)}<\u002Fspan><span class=\"lpct muted\">${pct}%<\u002Fspan><\u002Fdiv>`;}).join(\"\");\n    donutCard=`<div class=\"card\"><div class=\"donutwrap\">${donut(sd.slices,sd.total)}<\u002Fdiv><div class=\"legend\">${legend}<\u002Fdiv><\u002Fdiv>`;\n  }\n\n  return `<div class=\"screen safe-top\"><div class=\"hd\"><h1>統計<\u002Fh1><\u002Fdiv>\n    <div class=\"row\" style=\"gap:10px;align-items:stretch\">${tile(\"累計学習\",formatMinutes(tot.totalMinutes))}${tile(\"最長連続\",streak.longest+\"日\")}${tile(\"完璧の分野\",tot.perfectTopics)}<\u002Fdiv>\n    <div class=\"sect\">期間別<\u002Fdiv>${chipHTML}\n    ${goalCardHTML()}\n    ${donutCard}\n    <div class=\"sect\">この7日間<\u002Fdiv><div class=\"card\">${weeklyBars(days)}<\u002Fdiv>\n    ${subs.length>=3?`<div class=\"sect\">科目レーダー(進捗%)<\u002Fdiv><div class=\"card center\">${radar(subs.map(s=>({label:s.name,value:subjectStats(s).progress})),270,getVarHex(\"--accent\"))}<\u002Fdiv>`:\"\"}\n    <div class=\"muted center\" style=\"font-size:11px;margin-top:16px\">記録回数 ${tot.sessionCount}回<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ---------- 設定 ---------- */\nfunction settingsHTML(){\n  const themes=[[\"midnight\",\"ダーク\"],[\"daybreak\",\"ライト\"]];\n  const cb=db.settings.customTheme||\"#4F86F7\", cbh=hexToHsl(cb), cbSat=Math.max(16,Math.min(52,cbh.s));\n  const custOn=db.settings.theme===\"custom\";\n  const custTile=`<button data-act=\"setTheme:custom\" class=\"themecard ${custOn?\"on\":\"\"}\"><div class=\"themeprev\" style=\"background:${hslToHex(cbh.h,Math.min(cbSat,42),9)}\"><div class=\"themebar\" style=\"background:${hslToHex(cbh.h,Math.min(cbSat,40),16)}\"><span class=\"themedot\" style=\"background:${cb}\"><\u002Fspan><span class=\"themedot2\" style=\"background:${hslToHex(cbh.h,Math.min(cbSat,36),24)}\"><\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"themename\" style=\"color:${custOn?\"var(--text)\":\"var(--subtext)\"}\">🎨 カスタム${custOn?\" ✓\":\"\"}<\u002Fdiv><\u002Fbutton>`;\n  return `${backHeader(\"設定\")}<div class=\"screen\">\n    <div class=\"sect\" style=\"margin-top:8px\">受験<\u002Fdiv>\n    <div class=\"card press\" data-act=\"setSchool\"><div class=\"row\"><div class=\"bubble\" style=\"background:${alpha(\"#8AA2FF\",0.15)}\">🎯<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px\"><div style=\"font-weight:800;font-size:15px\">志望校<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">${db.settings.school?esc(db.settings.school):\"未設定\"}<\u002Fdiv><\u002Fdiv>${icon(\"chevronR\",18)}<\u002Fdiv><\u002Fdiv>\n    <div class=\"card press\" data-act=\"nav:exams\" style=\"margin-top:12px\"><div class=\"row\"><div class=\"bubble\" style=\"background:${alpha(\"#8AA2FF\",0.15)}\">${icon(\"cal\",18)}<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px\"><div style=\"font-weight:800;font-size:15px\">試験日を管理<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">${db.exams.length?db.exams.length+\"件 登録済み\":\"カウントダウンに表示されます\"}<\u002Fdiv><\u002Fdiv>${icon(\"chevronR\",18)}<\u002Fdiv><\u002Fdiv>\n\n    <div class=\"sect\">目標<\u002Fdiv>\n    ${db.settings.goal?`<div class=\"card\"><div class=\"row\" style=\"justify-content:space-between\"><div class=\"grow\"><div style=\"font-weight:800;font-size:15px\">${esc(db.settings.goal.label)}の目標<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">${esc(fmtMD2(db.settings.goal.start))}〜${esc(fmtMD2(db.settings.goal.end))} ・ ${db.settings.goal.hours}時間<\u002Fdiv><\u002Fdiv><button class=\"link\" data-act=\"editGoal\">編集<\u002Fbutton><\u002Fdiv><div style=\"height:1px;background:var(--faint);margin:12px 0\"><\u002Fdiv><button data-act=\"deleteGoal\" style=\"color:var(--danger);font-weight:800;font-size:13px\">目標を削除<\u002Fbutton><\u002Fdiv>`:`<div class=\"card press\" data-act=\"editGoal\"><div class=\"row\"><div class=\"bubble\" style=\"background:${tint(\"var(--accent)\",14)}\">📈<\u002Fdiv><div class=\"grow\" style=\"margin-left:12px\"><div style=\"font-weight:800;font-size:15px\">期間目標を設定<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">夏期など、期間内の合計時間を目標に<\u002Fdiv><\u002Fdiv>${icon(\"chevronR\",18)}<\u002Fdiv><\u002Fdiv>`}\n\n    <div class=\"sect\">テーマ<\u002Fdiv>\n    <div class=\"card\"><div class=\"themegrid\" style=\"grid-template-columns:repeat(2,1fr)\">${themes.map(([k,name])=>{const on=db.settings.theme===k;return `<button data-act=\"setTheme:${k}\" class=\"themecard ${on?\"on\":\"\"}\" data-theme=\"${k}\"><div class=\"themeprev\"><div class=\"themebar\"><span class=\"themedot\"><\u002Fspan><span class=\"themedot2\"><\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"themename\" style=\"color:${on?\"var(--text)\":\"var(--subtext)\"}\">${name}${on?\" ✓\":\"\"}<\u002Fdiv><\u002Fbutton>`;}).join(\"\")}<\u002Fdiv>\n  <\u002Fdiv>\n\n    <div class=\"sect\">アクセントカラー<\u002Fdiv>\n    <div class=\"card\"><div class=\"accentrow\">\n      <input type=\"color\" id=\"accentInput\" value=\"${esc(db.settings.customAccent||getVarHex(\"--accent\"))}\">\n      ${ACCENT_PRESETS.map(c=>`<button class=\"aswatch\" style=\"background:${c};border-color:${(db.settings.customAccent||\"\").toLowerCase()===c.toLowerCase()?\"var(--text)\":\"transparent\"}\" data-act=\"setAccent:${c.replace(\"#\",\"\")}\"><\u002Fbutton>`).join(\"\")}\n      ${db.settings.customAccent?`<button class=\"link\" data-act=\"resetAccent\">リセット<\u002Fbutton>`:\"\"}\n    <\u002Fdiv><div class=\"muted\" style=\"font-size:11px;margin-top:8px\">テーマの上からお好みの1色で上書きできます。<\u002Fdiv><\u002Fdiv>\n\n    <div class=\"sect\">効果音<\u002Fdiv>\n    <div class=\"card\">\n      <button class=\"revtoggle ${db.settings.soundOn?\"on\":\"\"}\" style=\"margin-top:0\" data-act=\"toggleSound\"><span class=\"revcheck\">${db.settings.soundOn?icon(\"check\",22):`<span class=\"revempty\"><\u002Fspan>`}<\u002Fspan><div class=\"grow\" style=\"text-align:left\"><div style=\"font-weight:800;font-size:14px\">ボタンの効果音<\u002Fdiv><div class=\"muted\" style=\"font-size:11px;margin-top:1px\">操作時に軽い音を鳴らします<\u002Fdiv><\u002Fdiv><\u002Fbutton>\n      ${db.settings.soundOn?`<div class=\"row\" style=\"gap:12px;align-items:center;margin-top:14px\"><span style=\"font-size:16px\">🔈<\u002Fspan><input type=\"range\" id=\"soundVolInput\" min=\"0\" max=\"100\" value=\"${Math.round((db.settings.soundVol!=null?db.settings.soundVol:0.5)*100)}\" style=\"flex:1\"><span style=\"font-size:16px\">🔊<\u002Fspan><span class=\"muted\" style=\"font-size:12px;font-weight:800;width:38px;text-align:right\">${Math.round((db.settings.soundVol!=null?db.settings.soundVol:0.5)*100)}%<\u002Fspan><\u002Fdiv><button class=\"btn ghost\" style=\"margin-top:12px\" data-act=\"testSound\">🎵 音をテスト<\u002Fbutton>`:\"\"}\n    <\u002Fdiv>\n\n    <div class=\"sect\">データ<\u002Fdiv>\n    <div class=\"card\" style=\"padding:6px\">\n      <button class=\"row\" style=\"width:100%;padding:12px\" data-act=\"export\"><span style=\"color:var(--accent)\">${icon(\"share\",19)}<\u002Fspan><div class=\"grow\" style=\"margin-left:12px;text-align:left\"><div style=\"font-weight:800;font-size:15px\">エクスポート(JSON)<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">機種変更やバックアップ用に書き出し<\u002Fdiv><\u002Fdiv><\u002Fbutton>\n      <div style=\"height:1px;background:var(--faint)\"><\u002Fdiv>\n      <button class=\"row\" style=\"width:100%;padding:12px\" data-act=\"import\"><span style=\"color:var(--accent)\">${icon(\"download\",19)}<\u002Fspan><div class=\"grow\" style=\"margin-left:12px;text-align:left\"><div style=\"font-weight:800;font-size:15px\">インポート<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">以前のトラッカーのバックアップも読み込めます(現在のデータは置換)<\u002Fdiv><\u002Fdiv><\u002Fbutton>\n    <\u002Fdiv>\n    <input type=\"file\" id=\"importFile\" accept=\"application/json,.json\" style=\"display:none\">\n\n    <div class=\"sect\">このアプリ<\u002Fdiv>\n    <div class=\"card\"><div style=\"font-weight:800;font-size:15px\">受験進捗トラッカー v2.0 (Web統合版)<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:6px;line-height:1.5\">データはこのブラウザの中だけに保存されます。別の端末やブラウザには引き継がれないので、機種変更時はエクスポート→インポートを使ってください。<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ---------- 試験日 ---------- */\nfunction examsHTML(){\n  const exams=db.exams.slice().sort((a,b)=>a.date<b.date?-1:1);\n  let body;\n  if(exams.length===0){\n    body=`<div class=\"empty\"><div style=\"font-weight:800;font-size:15px\">試験日を登録しよう<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:4px\">共通テスト・二次・模試など<br>複数登録できます<\u002Fdiv><\u002Fdiv>`;\n  } else {\n    body=exams.map(e=>{const d=daysUntil(e.date);return `<div class=\"card press\" data-act=\"editExam:${e.id}\" data-long=\"deleteExam:${e.id}\" style=\"margin-bottom:10px\"><div class=\"row\"><button data-act=\"primaryExam:${e.id}\" data-stop=\"1\">${star(e.isPrimary)}<\u002Fbutton><div class=\"grow\" style=\"margin-left:12px\"><div style=\"font-weight:800;font-size:15px\">${esc(e.name)}<\u002Fdiv><div class=\"muted\" style=\"font-size:12px;margin-top:2px\">${esc(formatDateJP(e.date))}<\u002Fdiv><\u002Fdiv><span style=\"font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;color:${d>=0?\"var(--text)\":\"var(--subtext)\"}\">${d>0?\"あと\"+d+\"日\":d===0?\"今日!\":\"終了\"}<\u002Fspan><\u002Fdiv><\u002Fdiv>`;}).join(\"\")+`<div class=\"muted center\" style=\"font-size:11px;margin-top:6px\">★でホームに大きく表示 / タップで編集 / 長押しで削除<\u002Fdiv>`;\n  }\n  return `${backHeader(\"試験日\")}<div class=\"screen\" style=\"padding-bottom:120px\">${body}<\u002Fdiv>\n    <div style=\"position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;padding:16px calc(16px) calc(env(safe-area-inset-bottom) + 20px);background:linear-gradient(transparent,var(--bg) 22%)\"><button class=\"btn\" data-act=\"addExam\">試験日を追加<\u002Fbutton><\u002Fdiv>`;\n}\n\n/* ---------- モーダル ---------- */\nfunction modalHTML(){\n  const t=modal.type;\n  if(t===\"subject\"){\n    const editing=!!modal.editingId;\n    return dialog(`${editing?\"科目を編集\":\"科目を追加\"}`,`\n      <input class=\"field\" id=\"mName\" data-model=\"name\" value=\"${esc(modalState.name)}\" placeholder=\"科目名(例: 数学)\" autofocus>\n      <div class=\"oblabel\">カラー<\u002Fdiv><div class=\"colorrow\"><input type=\"color\" id=\"subjColorInput\" value=\"${esc(modalState.color)}\" style=\"width:30px;height:30px;border-radius:15px\">${COLOR_CHOICES.map(c=>`<button class=\"cdot\" style=\"background:${c};border-color:${modalState.color===c?\"var(--text)\":\"transparent\"}\" data-act=\"mColor:${encodeURIComponent(c)}\"><\u002Fbutton>`).join(\"\")}<\u002Fdiv>\n      <div class=\"muted\" style=\"font-size:11px;margin:-2px 0 6px\">左端のピッカーで好きな色を自作できます<\u002Fdiv>\n      <div class=\"oblabel\">アイコン<\u002Fdiv><div class=\"iconrow\">${ICON_CHOICES.map(ic=>`<button class=\"ichoice\" style=\"${modalState.icon===ic?`background:${alpha(modalState.color,0.18)};border-color:${modalState.color}`:\"\"}\" data-act=\"mIcon:${encodeURIComponent(ic)}\">${ic}<\u002Fbutton>`).join(\"\")}<\u002Fdiv>\n      <button class=\"btn\" style=\"margin-top:12px;background:${modalState.color}\" data-act=\"submitModal\">${editing?\"保存\":\"追加\"}<\u002Fbutton>\n    `);\n  }\n  if(t===\"topic\"||t===\"rename\"){\n    return dialog(t===\"topic\"?\"分野を追加\":\"分野名を変更\",`\n      <input class=\"field\" id=\"mName\" data-model=\"name\" value=\"${esc(modalState.name)}\" placeholder=\"分野名(例: 三角関数)\" autofocus>\n      <button class=\"btn\" style=\"margin-top:14px\" data-act=\"submitModal\">${t===\"topic\"?\"追加\":\"保存\"}<\u002Fbutton>`);\n  }\n  if(t===\"memo\"){\n    return dialog(\"メモ\",`\n      <textarea class=\"field\" id=\"mMemo\" data-model=\"memo\" placeholder=\"苦手ポイント、参考書、次にやること…\">${esc(modalState.memo)}<\u002Ftextarea>\n      <button class=\"btn\" style=\"margin-top:14px\" data-act=\"submitModal\">保存<\u002Fbutton>`);\n  }\n  if(t===\"exam\"){\n    return dialog(modal.editingId?\"試験日を編集\":\"試験日を追加\",`\n      <input class=\"field\" id=\"mName\" data-model=\"name\" value=\"${esc(modalState.name)}\" placeholder=\"試験名(例: 共通テスト)\">\n      <div class=\"oblabel\">試験日<\u002Fdiv><input class=\"field\" type=\"date\" id=\"mDate\" value=\"${esc(modalState.date)}\">\n      <button class=\"btn\" style=\"margin-top:14px\" data-act=\"submitModal\">保存<\u002Fbutton>`);\n  }\n  if(t===\"manual\"){\n    const min=modalState.custom.trim()?Number(modalState.custom):modalState.preset;\n    const valid=Number.isFinite(min)&&min>0&&min<=1440;\n    return dialog(\"手動で記録\",`\n      <div class=\"oblabel\">学習時間<\u002Fdiv>\n      <div class=\"chips\">${MANUAL_PRESETS.map(m=>`<button class=\"chip ${!modalState.custom.trim()&&modalState.preset===m?\"on\":\"\"}\" style=\"${!modalState.custom.trim()&&modalState.preset===m?\"background:var(--accent);color:#fff\":\"\"}\" data-act=\"mPreset:${m}\">${m}分<\u002Fbutton>`).join(\"\")}<\u002Fdiv>\n      <input class=\"field\" id=\"mCustom\" data-model=\"custom\" value=\"${esc(modalState.custom)}\" placeholder=\"カスタム(分)\" inputmode=\"numeric\" style=\"margin-top:6px\">\n      <div class=\"oblabel\">学習内容(任意)<\u002Fdiv>\n      <input class=\"field\" id=\"mContentManual\" data-model=\"content\" value=\"${esc(modalState.content||\"\")}\" placeholder=\"例: 英語長文 Unit5、ベクトルの内積\">\n      <div class=\"oblabel\">学習日(この日を基準に復習日が決まります)<\u002Fdiv>\n      <input class=\"field\" type=\"date\" id=\"mDateManual\" value=\"${esc(modalState.date||todayStr())}\" max=\"${todayStr()}\">\n      ${reviewToggleHTML()}\n      <button class=\"btn\" style=\"margin-top:14px\" data-act=\"submitManual\" ${valid?\"\":\"disabled\"}>${valid?min+\"分 記録する\":\"記録する\"}<\u002Fbutton>`);\n  }\n  if(t===\"save\"){\n    const sub=db.subjects.find(x=>x.id===modal.subjectId);\n    const tp=modal.topicId!=null?db.topics.find(x=>x.id===modal.topicId):null;\n    return `<div class=\"sheetwrap\"><div class=\"sheetbg\"><\u002Fdiv><div class=\"sheet\">\n      <div style=\"text-align:center;margin-bottom:10px\"><div style=\"font-size:32px;font-weight:900\">${modal.min}分<\u002Fdiv><div class=\"clip muted\" style=\"font-size:12px;font-weight:700\">${esc(sub?sub.name:\"\")}${tp?\" / \"+esc(tp.name):\"\"}<\u002Fdiv><\u002Fdiv>\n      <input class=\"field\" id=\"saveContent\" data-model=\"content\" value=\"${esc(modalState.content||\"\")}\" placeholder=\"何をやった?(例: 青チャ例題12〜18)\" autofocus>\n      ${reviewToggleHTML()}\n      ${tp?`<div class=\"sect\" style=\"margin:14px 2px 6px\">この分野のステージ<\u002Fdiv>${STAGE_LABELS.map((lb,i)=>`<button class=\"sheetrow press\" style=\"background:${tp.stage===i?tint(\"var(\"+STAGE_VARS[i]+\")\",14):\"transparent\"}\" data-act=\"saveStage:${i}\"><span class=\"dot\" style=\"width:12px;height:12px;background:var(${STAGE_VARS[i]})\"><\u002Fspan><div class=\"grow\" style=\"text-align:left\"><div style=\"font-size:14px;font-weight:700\">${lb}<\u002Fdiv><\u002Fdiv>${tp.stage===i?`<span style=\"color:var(${STAGE_VARS[i]})\">${icon(\"check\",18)}<\u002Fspan>`:\"\"}<\u002Fbutton>`).join(\"\")}`:\"\"}\n      <button class=\"btn\" style=\"margin-top:14px;background:var(--s3)\" data-act=\"commitSave\">記録する<\u002Fbutton>\n      <button data-act=\"discardSave\" style=\"width:100%;color:var(--subtext);font-weight:700;font-size:13px;margin-top:10px;padding:8px\">破棄する<\u002Fbutton>\n    <\u002Fdiv><\u002Fdiv>`;\n  }\n  if(t===\"goal\"){\n    return dialog(db.settings.goal?\"目標を編集\":\"目標を設定\",`\n      <div class=\"oblabel\">目標の名前<\u002Fdiv>\n      <input class=\"field\" id=\"gLabel\" data-model=\"label\" value=\"${esc(modalState.label)}\" placeholder=\"例: 夏期\">\n      <div class=\"oblabel\">開始日<\u002Fdiv><input class=\"field\" type=\"date\" id=\"gStart\" value=\"${esc(modalState.start)}\">\n      <div class=\"oblabel\">終了日<\u002Fdiv><input class=\"field\" type=\"date\" id=\"gEnd\" value=\"${esc(modalState.end)}\">\n      <div class=\"oblabel\">目標時間(合計)<\u002Fdiv>\n      <input class=\"field\" id=\"gHours\" data-model=\"hours\" value=\"${esc(modalState.hours)}\" placeholder=\"例: 300\" inputmode=\"numeric\">\n      <button class=\"btn\" style=\"margin-top:14px\" data-act=\"submitModal\">保存<\u002Fbutton>`);\n  }\n  if(t===\"school\"){\n    return dialog(\"志望校\",`\n      <input class=\"field\" id=\"schoolInput\" data-model=\"school\" value=\"${esc(modalState.school)}\" placeholder=\"例: 神戸大学\" autofocus>\n      <button class=\"btn\" style=\"margin-top:14px\" data-act=\"submitModal\">保存<\u002Fbutton>`);\n  }\n  if(t===\"subjmenu\"){\n    const s=db.subjects.find(x=>x.id===modal.subjectId);\n    if(!s) return \"\";\n    const row=(act,label,sub,color)=>`<button class=\"sheetrow press\" data-act=\"${act}\" style=\"width:100%\"><div class=\"grow\" style=\"text-align:left\"><div style=\"font-size:15px;font-weight:700;color:${color||\"var(--text)\"}\">${label}<\u002Fdiv>${sub?`<div class=\"muted\" style=\"font-size:11px;margin-top:2px\">${sub}<\u002Fdiv>`:\"\"}<\u002Fdiv><\u002Fbutton>`;\n    return `<div class=\"sheetwrap\"><div class=\"sheetbg\" data-act=\"closeModal\"><\u002Fdiv><div class=\"sheet\">\n      <div style=\"font-size:15px;font-weight:800;margin-bottom:8px\">${esc(s.icon)} ${esc(s.name)}<\u002Fdiv>\n      ${row(\"editSubject:\"+s.id,\"✏️ 編集\",\"名前・カラー・アイコンを変更\")}\n      ${row(\"archiveSubjectC:\"+s.id,\"📥 アーカイブ\",\"進捗や記録は残したまま一覧から隠します。終わった科目・使わない科目の整理に。あとから戻せます\")}\n      ${row(\"deleteSubjectC:\"+s.id,\"🗑 削除\",\"分野と学習記録も完全に消えます\",\"var(--danger)\")}\n      <button class=\"btn ghost\" style=\"margin-top:8px\" data-act=\"closeModal\">キャンセル<\u002Fbutton>\n    <\u002Fdiv><\u002Fdiv>`;\n  }\n  if(t===\"stage\"){\n    const tp=db.topics.find(x=>x.id===modal.topicId);\n    return `<div class=\"sheetwrap\"><div class=\"sheetbg\" data-act=\"closeModal\"><\u002Fdiv><div class=\"sheet\">\n      <div style=\"font-size:15px;font-weight:800;margin-bottom:10px\">${tp?\"「\"+esc(tp.name)+\"」のステージ\":\"\"}<\u002Fdiv>\n      ${STAGE_LABELS.map((lb,i)=>`<button class=\"sheetrow press\" style=\"width:100%;background:${tp&&tp.stage===i?alpha(getVar(STAGE_VARS[i]),0.14):\"transparent\"}\" data-act=\"sheetStage:${i}\"><span class=\"dot\" style=\"width:13px;height:13px;background:var(${STAGE_VARS[i]})\"><\u002Fspan><div class=\"grow\" style=\"text-align:left\"><div style=\"font-size:15px;font-weight:700\">${lb}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px;margin-top:1px\">${STAGE_DESCS[i]}<\u002Fdiv><\u002Fdiv>${tp&&tp.stage===i?`<span style=\"color:var(${STAGE_VARS[i]})\">${icon(\"check\",20)}<\u002Fspan>`:\"\"}<\u002Fbutton>`).join(\"\")}\n    <\u002Fdiv><\u002Fdiv>`;\n  }\n  return \"\";\n}\nfunction dialog(title,inner){ return `<div class=\"backdrop\" data-act=\"closeModal\"><div class=\"dialog\" data-stop=\"1\"><h3>${esc(title)}<\u002Fh3>${inner}<\u002Fdiv><\u002Fdiv>`; }\nfunction reviewToggleHTML(){\n  const on=modalState.reviewOn;\n  return `<button class=\"revtoggle ${on?\"on\":\"\"}\" data-act=\"toggleReview\"><span class=\"revcheck\">${on?icon(\"check\",22):`<span class=\"revempty\"><\u002Fspan>`}<\u002Fspan><div class=\"grow\" style=\"text-align:left\"><div style=\"font-weight:800;font-size:14px\">復習リストに入れる<\u002Fdiv><div class=\"muted\" style=\"font-size:11px;margin-top:1px\">1日後・1週間後・1ヶ月後に復習<\u002Fdiv><\u0
